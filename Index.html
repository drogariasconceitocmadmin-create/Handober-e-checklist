<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <base target="_top">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Handover - Drogarias Conceito</title>
    <style>
      :root {
        --bg: #f3f5f8;
        --card: #ffffff;
        --border: #d5d9e0;
        --text: #1f2937;
        --muted: #6b7280;
        --primary: #2563eb;
        --primary-dark: #1d4ed8;
        --success: #15803d;
        --warning: #b45309;
        --danger: #b91c1c;
        --danger-bg: #fee2e2;
        --chip: #eef2ff;
      }

      * {
        box-sizing: border-box;
      }

      html {
        max-width: 100%;
        overflow-x: hidden;
      }

      body {
        margin: 0;
        max-width: 100%;
        background: var(--bg);
        color: var(--text);
        font-family: Arial, Helvetica, sans-serif;
        overflow-x: hidden;
      }

      .page {
        min-width: 0;
        max-width: 1120px;
        width: 100%;
        margin: 0 auto;
        padding: 16px;
      }

      .toolbar,
      .filter-group,
      .queue-list,
      .checklist-categories {
        min-width: 0;
      }

      .header {
        margin-bottom: 12px;
      }

      .header h1 {
        font-size: 24px;
        margin: 0 0 4px;
      }

      .header p {
        margin: 0;
        color: var(--muted);
      }

      .card {
        min-width: 0;
        width: 100%;
        max-width: 100%;
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 12px;
        box-shadow: 0 6px 18px rgba(15, 23, 42, 0.06);
      }

      .summary-grid {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 8px;
        margin-bottom: 10px;
      }

      .summary-box {
        background: #fff;
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 10px;
      }

      .summary-box .label {
        color: var(--muted);
        font-size: 11px;
        font-weight: 700;
        text-transform: uppercase;
      }

      .summary-box .value {
        font-size: 22px;
        font-weight: 700;
        margin-top: 4px;
      }

      .summary-box .sub {
        color: var(--muted);
        font-size: 12px;
        margin-top: 2px;
      }

      .toolbar {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 10px;
      }

      .filter-group {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
      }

      .filter-button {
        border: 1px solid var(--border);
        border-radius: 999px;
        background: #fff;
        color: var(--text);
        cursor: pointer;
        font-size: 12px;
        font-weight: 700;
        padding: 8px 12px;
      }

      .filter-button.active {
        background: var(--chip);
        border-color: #99a5d8;
        color: #1e3a8a;
      }

      .toolbar-actions {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
      }

      button {
        border: 0;
        border-radius: 8px;
        background: var(--primary);
        color: #fff;
        cursor: pointer;
        font-size: 13px;
        font-weight: 700;
        padding: 9px 11px;
      }

      button:hover {
        background: var(--primary-dark);
      }

      button.secondary {
        background: var(--success);
      }

      button.warning {
        background: #f59e0b;
        color: #1f2937;
      }

      button.light {
        background: #e5e7eb;
        color: var(--text);
      }

      button.whatsapp {
        background: #16a34a;
      }

      button.whatsapp:hover {
        background: #15803d;
      }

      button:disabled {
        opacity: 0.6;
        cursor: not-allowed;
      }

      .status {
        color: var(--muted);
        font-size: 12px;
        min-height: 18px;
        margin-top: 8px;
      }

      .status.error {
        color: var(--danger);
      }

      .queue-title {
        margin: 0 0 6px;
        font-size: 18px;
      }

      .queue-subtitle {
        margin: 0 0 8px;
        color: var(--muted);
        font-size: 12px;
      }

      .queue-list {
        display: grid;
        gap: 8px;
      }

      .queue-card {
        min-width: 0;
        width: 100%;
        max-width: 100%;
        border: 1px solid var(--border);
        border-radius: 10px;
        background: #fff;
        padding: 10px;
      }

      .queue-card.overdue {
        border-color: #ef4444;
        background: #fef2f2;
      }

      .queue-head {
        display: flex;
        justify-content: space-between;
        gap: 8px;
        align-items: flex-start;
        margin-bottom: 6px;
      }

      .badge {
        display: inline-block;
        border-radius: 999px;
        background: var(--chip);
        color: #1e3a8a;
        font-size: 11px;
        font-weight: 700;
        padding: 4px 8px;
      }

      .badge.status-pendente {
        background: #fee2e2;
        color: #991b1b;
      }

      .badge.status-comprado {
        background: #fef3c7;
        color: #92400e;
      }

      .badge.status-entregue,
      .badge.status-feito {
        background: #dcfce7;
        color: #166534;
      }

      .badge.status-na {
        background: #e5e7eb;
        color: #374151;
      }

      .queue-time {
        color: var(--muted);
        font-size: 11px;
      }

      .queue-title-main {
        font-size: 15px;
        font-weight: 700;
      }

      .queue-desc {
        color: var(--muted);
        font-size: 12px;
        margin-top: 2px;
      }

      .queue-meta {
        color: var(--muted);
        font-size: 12px;
        margin-top: 6px;
      }

      .queue-actions {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        margin-top: 8px;
      }

      .queue-actions button {
        font-size: 12px;
        margin: 0;
        padding: 7px 10px;
      }

      .section-title {
        margin: 0 0 8px;
        font-size: 18px;
      }

      .checklist-top {
        display: flex;
        justify-content: space-between;
        gap: 8px;
        align-items: center;
        margin-bottom: 8px;
      }

      .checklist-summary {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        margin-bottom: 8px;
      }

      .checklist-chip {
        border-radius: 999px;
        background: var(--chip);
        color: #1e3a8a;
        font-size: 11px;
        font-weight: 700;
        padding: 5px 9px;
      }

      .checklist-chip.alert {
        background: var(--danger-bg);
        color: var(--danger);
      }

      .checklist-hint {
        color: var(--muted);
        font-size: 12px;
        margin: 4px 0 8px;
      }

      .checklist-categories {
        display: grid;
        gap: 8px;
      }

      .checklist-category {
        min-width: 0;
        max-width: 100%;
        border: 1px solid var(--border);
        border-radius: 10px;
        background: #fff;
      }

      .checklist-category-head {
        display: flex;
        justify-content: space-between;
        gap: 8px;
        align-items: center;
        width: 100%;
        border: 0;
        border-radius: 10px 10px 0 0;
        background: #f8fafc;
        color: var(--text);
        font-size: 12px;
        text-align: left;
        padding: 8px 10px;
      }

      .checklist-category-head:hover {
        background: #f1f5f9;
      }

      .checklist-category-meta {
        color: var(--muted);
        font-size: 11px;
        white-space: nowrap;
      }

      .checklist-items {
        padding: 8px;
        display: grid;
        gap: 7px;
      }

      .check-item {
        border: 1px solid var(--border);
        border-radius: 8px;
        background: #fff;
        padding: 8px;
      }

      .check-item.late {
        border-color: #ef4444;
        background: #fef2f2;
      }

      .check-item-title {
        font-size: 13px;
        font-weight: 700;
      }

      .check-item-desc {
        color: var(--muted);
        font-size: 12px;
        margin-top: 2px;
      }

      .check-item-meta {
        color: var(--muted);
        font-size: 11px;
        margin-top: 5px;
      }

      .check-actions {
        display: flex;
        flex-wrap: wrap;
        gap: 5px;
        margin-top: 6px;
      }

      .check-actions button {
        font-size: 11px;
        padding: 6px 8px;
      }

      .check-actions button.active {
        outline: 2px solid rgba(37, 99, 235, 0.35);
      }

      .obs-bar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-top: 6px;
        gap: 8px;
      }

      .obs-flag {
        color: #0f766e;
        font-size: 11px;
        font-weight: 700;
      }

      .obs-panel {
        display: flex;
        gap: 6px;
        margin-top: 6px;
      }

      .obs-panel input {
        border: 1px solid var(--border);
        border-radius: 8px;
        font: inherit;
        font-size: 12px;
        padding: 8px;
        width: 100%;
      }

      .obs-panel button {
        font-size: 12px;
      }

      .form-panel h2 {
        margin: 0 0 8px;
        font-size: 18px;
      }

      .form-grid {
        display: grid;
        gap: 10px;
      }

      .field label {
        display: block;
        font-size: 12px;
        font-weight: 700;
        margin-bottom: 4px;
      }

      .field input,
      .field select,
      .field textarea {
        border: 1px solid var(--border);
        border-radius: 8px;
        font: inherit;
        padding: 9px;
        width: 100%;
      }

      .field textarea {
        min-height: 90px;
        resize: vertical;
      }

      .checkbox-row {
        display: flex;
        align-items: center;
        gap: 6px;
      }

      .checkbox-row input {
        width: auto;
      }

      .form-actions {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
      }

      .hidden {
        display: none !important;
      }

      .empty-box {
        color: var(--muted);
        border: 1px dashed var(--border);
        border-radius: 8px;
        font-size: 13px;
        padding: 10px;
      }

      @media (max-width: 900px) {
        .summary-grid {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }

        .toolbar {
          flex-direction: column;
          align-items: stretch;
        }

        .toolbar-actions {
          justify-content: flex-end;
        }
      }

      @media (max-width: 640px) {
        .page {
          padding: 10px;
        }

        .summary-grid {
          grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
        }

        .queue-head {
          flex-direction: column;
        }

        .queue-actions button,
        .check-actions button,
        .form-actions button,
        .toolbar-actions button {
          flex: 1 1 calc(50% - 6px);
        }

        .obs-panel {
          flex-direction: column;
        }
      }
    </style>
  </head>
  <body>
    <main class="page">
      <header class="header">
        <h1>Handover - Drogarias Conceito</h1>
        <p>Painel operacional para turno, pendências e medicamentos.</p>
      </header>

      <section id="operation-summary" class="summary-grid"></section>

      <section class="toolbar card">
        <div class="filter-group" id="queue-filters">
          <button type="button" class="filter-button active" data-filter="todos" onclick="setQueueFilter('todos')">
            Todos
          </button>
          <button type="button" class="filter-button" data-filter="pendentes" onclick="setQueueFilter('pendentes')">
            Pendentes
          </button>
          <button type="button" class="filter-button" data-filter="comprados" onclick="setQueueFilter('comprados')">
            Comprados
          </button>
          <button type="button" class="filter-button" data-filter="entregues" onclick="setQueueFilter('entregues')">
            Entregues
          </button>
          <button
            type="button"
            class="filter-button"
            data-filter="resolvidos_parcialmente"
            onclick="setQueueFilter('resolvidos_parcialmente')"
          >
            Resolvidos parcialmente
          </button>
          <button
            type="button"
            class="filter-button"
            data-filter="comprados_sem_aviso"
            onclick="setQueueFilter('comprados_sem_aviso')"
          >
            Comprados sem aviso
          </button>
          <button
            type="button"
            class="filter-button"
            data-filter="vencidos_hoje"
            onclick="setQueueFilter('vencidos_hoje')"
          >
            Vencidos/Hoje
          </button>
        </div>
        <div class="toolbar-actions">
          <button id="toggle-form-btn" type="button" class="light" onclick="toggleFormPanel()">Novo registro</button>
        </div>
      </section>

      <section class="card" style="margin-top: 10px;">
        <h2 class="queue-title">Pendências operacionais</h2>
        <p id="queue-subtitle" class="queue-subtitle"></p>
        <div id="queue-list" class="queue-list"></div>
        <div id="queue-empty" class="empty-box hidden">Nenhuma pendência para o filtro selecionado.</div>
        <div id="queue-status" class="status" aria-live="polite"></div>
      </section>

      <section class="card" style="margin-top: 10px;">
        <div class="checklist-top">
          <h2 class="section-title">Checklist do Turno</h2>
          <button id="checklist-toggle-btn" type="button" class="light" onclick="toggleChecklistPanel()">
            Abrir checklist
          </button>
        </div>

        <div id="checklist-summary" class="checklist-summary"></div>
        <p id="checklist-generate-hint" class="checklist-hint"></p>

        <div class="toolbar-actions" style="margin-bottom: 8px;">
          <input
            id="checklist-responsavel"
            type="text"
            placeholder="Responsável (opcional)"
            style="border:1px solid var(--border); border-radius:8px; font:inherit; padding:8px; flex:1 1 220px;"
          >
          <button id="checklist-generate-btn" type="button" class="light" onclick="refreshChecklistToday()">
            Atualizar visualização
          </button>
        </div>

        <div id="checklist-content" class="hidden">
          <div id="checklist-categories" class="checklist-categories"></div>
        </div>
        <div id="checklist-status" class="status" aria-live="polite"></div>
      </section>

      <section id="form-panel" class="card hidden" style="margin-top: 10px;">
        <h2>Novo registro</h2>
        <form id="request-form" class="form-grid">
          <div class="field">
            <label for="category">Categoria</label>
            <select id="category" name="category">
              <option value="Geral">Geral</option>
              <option value="Medicamentos">Medicamentos</option>
            </select>
          </div>

          <div id="general-fields">
            <div class="field">
              <label for="autor">Autor</label>
              <input id="autor" name="autor" autocomplete="name">
            </div>
            <div class="field">
              <label for="descricao">Descrição</label>
              <textarea id="descricao" name="descricao"></textarea>
            </div>
          </div>

          <div id="medicine-fields" class="hidden">
            <div class="field">
              <label for="tipo">Tipo</label>
              <select id="tipo" name="tipo">
                <option value="Encomenda">Encomenda</option>
                <option value="Falta">Falta</option>
              </select>
            </div>

            <div class="field">
              <label for="medicamento">Medicamento</label>
              <input id="medicamento" name="medicamento">
            </div>

            <div class="field">
              <label for="precoVenda">Preço de venda</label>
              <input id="precoVenda" name="precoVenda" type="text" inputmode="decimal" placeholder="R$ 0,00">
            </div>

            <div class="checkbox-row field">
              <input id="prePago" name="prePago" type="checkbox">
              <label for="prePago" style="margin:0;">Pré-pago</label>
            </div>

            <div class="field">
              <label for="cliente">Cliente</label>
              <input id="cliente" name="cliente">
            </div>

            <div class="field">
              <label for="telefone">Telefone</label>
              <input id="telefone" name="telefone" placeholder="(11) 91234-5678">
            </div>

            <div class="field">
              <label for="atendente">Atendente</label>
              <input id="atendente" name="atendente">
            </div>

            <div class="field">
              <label for="previsaoEntrega">Previsão de entrega</label>
              <input id="previsaoEntrega" name="previsaoEntrega" type="date">
            </div>
          </div>

          <div class="form-actions">
            <button id="save-button" type="submit">Salvar</button>
            <button type="reset" class="light">Limpar</button>
          </div>
          <div id="form-status" class="status" aria-live="polite"></div>
        </form>
      </section>
    </main>

    <script>
      const QUEUE_FILTERS = [
        'todos',
        'pendentes',
        'comprados',
        'entregues',
        'resolvidos_parcialmente',
        'comprados_sem_aviso',
        'vencidos_hoje',
      ];

      let dashboardData = parseInitialDataB64('<?= initialDataB64 ?>');
      let activeQueueFilter = 'todos';
      let isChecklistExpanded = false;
      const openChecklistCategories = new Set();
      const openChecklistObservations = new Set();

      const formPanel = document.getElementById('form-panel');
      const toggleFormBtn = document.getElementById('toggle-form-btn');
      const requestForm = document.getElementById('request-form');
      const categorySelect = document.getElementById('category');
      const generalFields = document.getElementById('general-fields');
      const medicineFields = document.getElementById('medicine-fields');
      const formStatus = document.getElementById('form-status');
      const saveButton = document.getElementById('save-button');

      const summaryContainer = document.getElementById('operation-summary');
      const queueList = document.getElementById('queue-list');
      const queueEmpty = document.getElementById('queue-empty');
      const queueStatus = document.getElementById('queue-status');
      const queueSubtitle = document.getElementById('queue-subtitle');

      const checklistToggleBtn = document.getElementById('checklist-toggle-btn');
      const checklistSummary = document.getElementById('checklist-summary');
      const checklistHint = document.getElementById('checklist-generate-hint');
      const checklistContent = document.getElementById('checklist-content');
      const checklistCategories = document.getElementById('checklist-categories');
      const checklistStatus = document.getElementById('checklist-status');
      const checklistGenerateBtn = document.getElementById('checklist-generate-btn');
      const checklistResponsavel = document.getElementById('checklist-responsavel');

      categorySelect.addEventListener('change', updateVisibleFields);
      requestForm.addEventListener('submit', handleSubmit);
      requestForm.addEventListener('reset', function () {
        setTimeout(updateVisibleFields, 0);
      });

      renderAll();

      function renderAll() {
        renderSummary();
        renderQueue();
        renderChecklistSection();
      }

      function renderSummary() {
        const allQueueItems = buildWorkQueueItems(dashboardData);
        const pendingQueue = allQueueItems.filter(function (item) {
          return item.statusKey === 'pendente';
        });
        const medicationPending = allQueueItems.filter(function (item) {
          return item.type === 'medicamento' && item.statusKey === 'pendente';
        });
        const boughtWithoutWhatsapp = allQueueItems.filter(function (item) {
          return item.type === 'medicamento' && item.statusKey === 'comprado' && item.whatsappNotSent;
        });
        const checklist = dashboardData.checklistTurno;
        const checklistSummaryData = checklist.summary || {
          totalItens: 0,
          itensFeitos: 0,
          itensPendentes: 0,
          percentualConcluido: 0,
        };

        summaryContainer.innerHTML = [
          buildSummaryBox_('Pendências', pendingQueue.length, 'Fila de trabalho ativa'),
          buildSummaryBox_('Medicamentos pendentes', medicationPending.length, 'Aguardando ação'),
          buildSummaryBox_('Comprados sem aviso', boughtWithoutWhatsapp.length, 'Prioridade de WhatsApp'),
          buildSummaryBox_(
            'Checklist manhã',
            checklistSummaryData.percentualConcluido + '%',
            checklistSummaryData.itensPendentes + ' pendente(s)'
          ),
        ].join('');
      }

      function buildSummaryBox_(label, value, sub) {
        return (
          '<div class="summary-box">' +
          '<div class="label">' +
          escapeHtml(label) +
          '</div>' +
          '<div class="value">' +
          escapeHtml(value) +
          '</div>' +
          '<div class="sub">' +
          escapeHtml(sub) +
          '</div>' +
          '</div>'
        );
      }

      function renderQueue() {
        const queueItems = filterQueueItems_(buildWorkQueueItems(dashboardData));
        queueList.innerHTML = '';
        queueEmpty.classList.toggle('hidden', queueItems.length !== 0);
        queueSubtitle.textContent =
          'Filtro atual: ' + humanizeQueueFilter_(activeQueueFilter) + ' (' + queueItems.length + ')';

        if (queueItems.length === 0) {
          return;
        }

        queueItems.forEach(function (item) {
          const card = document.createElement('article');
          card.className = 'queue-card' + (item.isOverdue ? ' overdue' : '');
          card.innerHTML = buildQueueCardHtml_(item);
          queueList.appendChild(card);
        });
      }

      function buildQueueCardHtml_(item) {
        const statusClass = item.statusKey ? ' status-' + item.statusKey : '';
        const badges = [
          '<span class="badge">' + escapeHtml(item.originLabel) + '</span>',
          '<span class="badge' + statusClass + '">' + escapeHtml(item.statusLabel) + '</span>',
        ];

        if (item.isOverdue) {
          badges.push('<span class="badge status-pendente">Atrasado/Hoje</span>');
        }

        const metaLines = [
          item.person ? 'Responsável/Cliente: ' + item.person : '',
          item.forecast ? 'Previsão: ' + item.forecast : '',
          item.price ? 'Preço de venda: ' + item.price : '',
          item.extraMeta || '',
        ].filter(Boolean);

        return (
          '<div class="queue-head">' +
          '<div>' +
          badges.join(' ') +
          '</div>' +
          '<div class="queue-time">' +
          escapeHtml(item.timeLabel) +
          '</div>' +
          '</div>' +
          '<div class="queue-title-main">' +
          escapeHtml(item.title) +
          '</div>' +
          '<div class="queue-desc">' +
          escapeHtml(item.description) +
          '</div>' +
          '<div class="queue-meta">' +
          escapeHtml(metaLines.join(' | ')) +
          '</div>' +
          '<div class="queue-meta">Ações</div>' +
          '<div class="queue-actions">' +
          item.actions
            .map(function (action) {
              return (
                '<button ' +
                'data-queue-action="1" ' +
                'class="' +
                escapeHtml(action.className || '') +
                '" ' +
                'type="button" ' +
                'onclick="' +
                escapeAttribute(action.handler) +
                "('" +
                escapeAttribute(item.id) +
                "')\">" +
                escapeHtml(action.label) +
                '</button>'
              );
            })
            .join('') +
          '</div>'
        );
      }

      function buildWorkQueueItems(data) {
        const generalItems = (data.geral || []).map(function (item) {
          return {
            id: item.ID,
            type: 'geral',
            originLabel: 'Solicitações',
            statusLabel: 'Pendente',
            statusKey: 'pendente',
            title: item.Descricao || 'Solicitação sem descrição',
            description: 'Autor: ' + (item.Autor || '-'),
            person: item.Autor || '-',
            forecast: '',
            price: '',
            isOverdue: false,
            extraMeta: '',
            timeLabel: formatDateTime(item.Timestamp),
            timeSort: parseDateTime_(item.Timestamp),
            actions: [
              {
                label: 'Marcar como resolvido',
                handler: 'markResolved',
                className: '',
              },
            ],
          };
        });

        const medicationItems = (data.medicamentos || []).map(function (item) {
          const status = normalizeMedicationStatus_(item);
          const whatsappAvailable = canShowWhatsAppButton(item);
          const whatsappSent = normalizeWhatsappStatus_(item.Status_Aviso_WhatsApp) === 'tentativa registrada';

          const actions = [];
          if (!item.Comprado) {
            actions.push({
              label: 'Marcar como comprado',
              handler: 'markPurchased',
              className: 'secondary',
            });
          }

          if (whatsappAvailable) {
            actions.push({
              label: whatsappSent ? 'Reabrir WhatsApp' : 'Avisar no WhatsApp',
              handler: 'notifyClientWhatsApp',
              className: 'whatsapp',
            });
          }

          if (!item.Entregue) {
            actions.push({
              label: 'Marcar como entregue',
              handler: 'markDelivered',
              className: '',
            });
          }

          return {
            id: item.ID,
            type: 'medicamento',
            originLabel: 'Medicamentos',
            statusLabel: status.label,
            statusKey: status.key,
            title: item.Medicamento || 'Medicamento sem nome',
            description: 'Tipo: ' + (item.Tipo || '-') + ' | Pré-pago: ' + (item.Pre_Pago ? 'Sim' : 'Não'),
            person: item.Cliente ? item.Cliente + ' / ' + (item.Atendente || '-') : item.Atendente || '-',
            forecast: item.Previsao_Entrega ? formatDate(item.Previsao_Entrega) : '',
            price: formatCurrencyBr_(item.Preco_Venda),
            isOverdue: isOverdue(item),
            extraMeta:
              'Aviso WhatsApp: ' +
              (item.Status_Aviso_WhatsApp || 'Não registrado') +
              (item.Telefone ? ' | Telefone: ' + item.Telefone : ''),
            timeLabel: formatDateTime(item.Timestamp),
            timeSort: parseDateTime_(item.Timestamp),
            whatsappNotSent: whatsappAvailable && !whatsappSent,
            actions: actions,
          };
        });

        return generalItems.concat(medicationItems).sort(function (a, b) {
          if (a.isOverdue !== b.isOverdue) {
            return a.isOverdue ? -1 : 1;
          }

          const timeA = Number(a.timeSort || 0);
          const timeB = Number(b.timeSort || 0);
          return timeB - timeA;
        });
      }

      function filterQueueItems_(items) {
        switch (activeQueueFilter) {
          case 'pendentes':
            return items.filter(function (item) {
              return item.statusKey === 'pendente';
            });
          case 'comprados':
            return items.filter(function (item) {
              return item.statusKey === 'comprado';
            });
          case 'entregues':
            return items.filter(function (item) {
              return item.statusKey === 'entregue';
            });
          case 'resolvidos_parcialmente':
            return items.filter(function (item) {
              return item.statusKey === 'resolvido_parcialmente';
            });
          case 'comprados_sem_aviso':
            return items.filter(function (item) {
              return item.type === 'medicamento' && item.statusKey === 'comprado' && item.whatsappNotSent;
            });
          case 'vencidos_hoje':
            return items.filter(function (item) {
              return item.type === 'medicamento' && item.isOverdue;
            });
          case 'todos':
          default:
            return items;
        }
      }

      function setQueueFilter(filterKey) {
        if (QUEUE_FILTERS.indexOf(filterKey) === -1) {
          return;
        }

        activeQueueFilter = filterKey;
        document.querySelectorAll('.filter-button').forEach(function (button) {
          button.classList.toggle('active', button.dataset.filter === filterKey);
        });
        renderQueue();
      }

      function humanizeQueueFilter_(filterKey) {
        const mapping = {
          todos: 'Todos',
          pendentes: 'Pendentes',
          comprados: 'Comprados',
          entregues: 'Entregues',
          resolvidos_parcialmente: 'Resolvidos parcialmente',
          comprados_sem_aviso: 'Comprados sem aviso',
          vencidos_hoje: 'Vencidos/Hoje',
        };
        return mapping[filterKey] || 'Todos';
      }

      function normalizeMedicationStatus_(item) {
        const statusText = String(item.Status || '')
          .trim()
          .toLowerCase();
        if (item.Entregue || statusText === 'entregue') {
          return { key: 'entregue', label: 'Entregue' };
        }
        if (statusText === 'resolvido parcialmente') {
          return { key: 'resolvido_parcialmente', label: 'Resolvido parcialmente' };
        }
        if (item.Comprado || statusText === 'comprado') {
          return { key: 'comprado', label: 'Comprado' };
        }
        return { key: 'pendente', label: 'Pendente' };
      }

      function normalizeWhatsappStatus_(value) {
        return String(value || '')
          .trim()
          .toLowerCase();
      }

      function renderChecklistSection() {
        const checklist = dashboardData.checklistTurno;
        const items = checklist.items || [];
        const summary = checklist.summary || buildChecklistSummary_(items);
        const hasLateAlert = checklist.isAfterDeadline && summary.itensPendentes > 0;

        checklistSummary.innerHTML = [
          '<span class="checklist-chip">Turno: ' + escapeHtml(checklist.turno || 'Manhã') + '</span>',
          '<span class="checklist-chip">Data: ' + escapeHtml(checklist.data || '-') + '</span>',
          '<span class="checklist-chip">Itens: ' + escapeHtml(summary.totalItens) + '</span>',
          '<span class="checklist-chip">Feitos: ' + escapeHtml(summary.itensFeitos) + '</span>',
          '<span class="checklist-chip">Pendentes: ' + escapeHtml(summary.itensPendentes) + '</span>',
          '<span class="checklist-chip">Concluído: ' + escapeHtml(summary.percentualConcluido) + '%</span>',
          hasLateAlert
            ? '<span class="checklist-chip alert">Pendências após 07:30</span>'
            : '',
        ].join('');

        if (items.length > 0) {
          checklistHint.textContent = 'Checklist de hoje já gerado.';
          checklistGenerateBtn.textContent = 'Atualizar visualização';
        } else {
          checklistHint.textContent = 'Checklist ainda não gerado.';
          checklistGenerateBtn.textContent = 'Gerar checklist de hoje';
        }

        checklistContent.classList.toggle('hidden', !isChecklistExpanded);
        checklistToggleBtn.textContent = isChecklistExpanded ? 'Fechar checklist' : 'Abrir checklist';

        if (!isChecklistExpanded) {
          checklistCategories.innerHTML = '';
          return;
        }

        if (items.length === 0) {
          checklistCategories.innerHTML =
            '<div class="empty-box">Sem itens para o turno. Clique em "Gerar checklist de hoje".</div>';
          return;
        }

        const grouped = groupChecklistByCategory_(items);
        checklistCategories.innerHTML = Object.keys(grouped)
          .map(function (category) {
            const categoryKey = encodeURIComponent(category);
            const categoryItems = grouped[category];
            const summaryByCategory = buildChecklistSummary_(categoryItems);
            const isOpen = openChecklistCategories.has(category);
            const itemsHtml = isOpen
              ? categoryItems
                  .map(function (item) {
                    return buildChecklistItemHtml_(item, checklist.isAfterDeadline);
                  })
                  .join('')
              : '';

            return (
              '<section class="checklist-category">' +
              '<button type="button" class="checklist-category-head" onclick="toggleChecklistCategory(\'' +
              escapeAttribute(categoryKey) +
              "')\">" +
              '<span>' +
              escapeHtml(category) +
              '</span>' +
              '<span class="checklist-category-meta">' +
              escapeHtml(summaryByCategory.itensFeitos) +
              '/' +
              escapeHtml(summaryByCategory.totalItens) +
              ' • ' +
              escapeHtml(summaryByCategory.percentualConcluido) +
              '%</span>' +
              '</button>' +
              (isOpen ? '<div class="checklist-items">' + itemsHtml + '</div>' : '') +
              '</section>'
            );
          })
          .join('');
      }

      function groupChecklistByCategory_(items) {
        return items.reduce(function (groups, item) {
          const category = item.Categoria || 'Sem categoria';
          if (!groups[category]) {
            groups[category] = [];
          }
          groups[category].push(item);
          return groups;
        }, {});
      }

      function buildChecklistItemHtml_(item, isAfterDeadline) {
        const status = formatChecklistStatus_(item.Status);
        const statusClass = statusToClass_(status);
        const isLate = isAfterDeadline && status === 'Pendente';
        const itemClass = 'check-item' + (isLate ? ' late' : '');
        const observationInputId = buildChecklistObservationInputId_(item.ID);
        const showObservation = openChecklistObservations.has(item.ID);
        const hasObservation = Boolean((item.Observacao || '').trim());
        const checkInfo = item.Data_Hora_Check
          ? 'Última marcação: ' + formatDateTime(item.Data_Hora_Check)
          : 'Sem marcação';

        return (
          '<article class="' +
          itemClass +
          '">' +
          '<div class="check-item-title">' +
          escapeHtml(item.Item) +
          ' <span class="badge ' +
          statusClass +
          '">' +
          escapeHtml(status) +
          '</span>' +
          '</div>' +
          '<div class="check-item-desc">' +
          escapeHtml(item.Descricao || '') +
          '</div>' +
          '<div class="check-item-meta">' +
          escapeHtml(checkInfo) +
          '</div>' +
          '<div class="check-actions">' +
          buildChecklistActionButton_(item.ID, 'Feito', status === 'Feito') +
          buildChecklistActionButton_(item.ID, 'Não aplicável', status === 'Não aplicável', 'secondary') +
          buildChecklistActionButton_(item.ID, 'Pendente', status === 'Pendente', 'light') +
          '</div>' +
          '<div class="obs-bar">' +
          '<button type="button" class="light" onclick="toggleChecklistObservation(\'' +
          escapeAttribute(item.ID) +
          '\')">' +
          (showObservation ? 'Fechar observação' : 'Observação') +
          '</button>' +
          (hasObservation ? '<span class="obs-flag">com observação</span>' : '<span></span>') +
          '</div>' +
          (showObservation
            ? '<div class="obs-panel">' +
              '<input id="' +
              escapeAttribute(observationInputId) +
              '" type="text" value="' +
              escapeAttribute(item.Observacao || '') +
              '" placeholder="Observação do item">' +
              '<button type="button" class="light" onclick="saveChecklistObservation(\'' +
              escapeAttribute(item.ID) +
              '\', \'' +
              escapeAttribute(observationInputId) +
              '\')">Salvar</button>' +
              '</div>'
            : '') +
          '</article>'
        );
      }

      function buildChecklistActionButton_(itemId, statusLabel, isActive, className) {
        const statusClass = className ? ' ' + className : '';
        const activeClass = isActive ? ' active' : '';
        return (
          '<button ' +
          'type="button" ' +
          'class="' +
          statusClass.trim() +
          activeClass +
          '" ' +
          'data-check-action="1" ' +
          'onclick="updateChecklistStatus(\'' +
          escapeAttribute(itemId) +
          "', '" +
          escapeAttribute(statusLabel) +
          "')\">" +
          escapeHtml(statusLabel === 'Não aplicável' ? 'N/A' : statusLabel) +
          '</button>'
        );
      }

      function toggleChecklistPanel() {
        isChecklistExpanded = !isChecklistExpanded;
        renderChecklistSection();
      }

      function toggleChecklistCategory(encodedCategory) {
        const category = decodeURIComponent(encodedCategory);
        if (openChecklistCategories.has(category)) {
          openChecklistCategories.delete(category);
        } else {
          openChecklistCategories.add(category);
        }
        renderChecklistSection();
      }

      function toggleChecklistObservation(itemId) {
        if (openChecklistObservations.has(itemId)) {
          openChecklistObservations.delete(itemId);
        } else {
          openChecklistObservations.add(itemId);
        }
        renderChecklistSection();
      }

      function updateChecklistStatus(id, status) {
        const responsavel = checklistResponsavel ? checklistResponsavel.value : '';
        setStatus(checklistStatus, 'Atualizando checklist...');
        setChecklistButtonsDisabled(true);

        try {
          getScriptRunner_()
            .withSuccessHandler(function (response) {
              dashboardData = normalizeData(response.items);

              setStatus(checklistStatus, 'Checklist atualizado.');

            })
            .withFailureHandler(function (error) {
              setStatus(checklistStatus, getErrorMessage(error), true);
              setChecklistButtonsDisabled(false);
            })
            .updateChecklistItemStatus(id, status, responsavel);
        } catch (error) {
          setStatus(checklistStatus, error.message, true);
          setChecklistButtonsDisabled(false);

        setChecklistButtonsDisabled(true);

              dashboardData = normalizeData(response.items);

              setChecklistButtonsDisabled(false);
            })
            .withFailureHandler(function (error) {
              setStatus(checklistStatus, getErrorMessage(error), true);
              setChecklistButtonsDisabled(false);

        setStatus(checklistStatus, 'Atualizando checklist...');

      function formatChecklistStatus_(status) {
        const normalized = String(status || '')
          .trim()
          .toLowerCase();
        if (normalized === 'feito') {
          return 'Feito';
        }
        if (normalized === 'não aplicável' || normalized === 'nao aplicavel' || normalized === 'n/a') {
          return 'Não aplicável';
        }
        return 'Pendente';
      }

      function statusToClass_(status) {
        if (status === 'Feito') {
          return 'status-feito';
        }
        if (status === 'Não aplicável') {
          return 'status-na';
        }
        if (status === 'Entregue') {
          return 'status-entregue';
        }
        if (status === 'Comprado') {
          return 'status-comprado';
        }
        return 'status-pendente';
      }

      function buildChecklistObservationInputId_(id) {
        return 'check-obs-' + String(id || '').replace(/[^a-zA-Z0-9_-]/g, '_');
      }

      function buildChecklistSummary_(items) {
        const totalItens = items.length;
        const itensFeitos = items.filter(function (item) {
          return formatChecklistStatus_(item.Status) === 'Feito';
        }).length;
        const itensNaoAplicaveis = items.filter(function (item) {
          return formatChecklistStatus_(item.Status) === 'Não aplicável';
        }).length;
        const itensPendentes = items.filter(function (item) {
          return formatChecklistStatus_(item.Status) === 'Pendente';
        }).length;
        const percentualConcluido =
          totalItens > 0 ? Math.round(((itensFeitos + itensNaoAplicaveis) / totalItens) * 100) : 0;

        return {
          totalItens: totalItens,
          itensFeitos: itensFeitos,
          itensNaoAplicaveis: itensNaoAplicaveis,
          itensPendentes: itensPendentes,
          percentualConcluido: percentualConcluido,
        };
      }

      function updateVisibleFields() {
        const isMedication = categorySelect.value === 'Medicamentos';
        generalFields.classList.toggle('hidden', isMedication);
        medicineFields.classList.toggle('hidden', !isMedication);
        clearStatus(formStatus);
      }

      function toggleFormPanel() {
        const willOpen = formPanel.classList.contains('hidden');
        formPanel.classList.toggle('hidden', !willOpen);
        toggleFormBtn.textContent = willOpen ? 'Fechar novo registro' : 'Novo registro';
      }

      function handleSubmit(event) {
        event.preventDefault();
        clearStatus(formStatus);

        const tab = categorySelect.value;
        const payload = tab === 'Geral' ? getGeneralPayload() : getMedicinePayload();
        if (tab === 'Medicamentos') {
          const priceResult = normalizePriceInput_(payload.precoVenda);
          if (priceResult.error) {
            setStatus(formStatus, priceResult.error, true);
            return;
          }
          payload.precoVenda = priceResult.value;
        }

        const validationError = validatePayload(tab, payload);
        if (validationError) {
          setStatus(formStatus, validationError, true);
          return;
        }

        setFormLoading_(true);
        setStatus(formStatus, 'Salvando...');

        try {
          getScriptRunner_()
            .withSuccessHandler(function (response) {
              dashboardData = normalizeData(response.items);
              renderAll();
              requestForm.reset();
              updateVisibleFields();
              setStatus(formStatus, 'Registro salvo com sucesso.');
              setFormLoading_(false);
            })
            .withFailureHandler(function (error) {
              setStatus(formStatus, getErrorMessage(error), true);
              setFormLoading_(false);
            })
            .saveData(tab, payload);
        } catch (error) {
          setStatus(formStatus, error.message, true);
          setFormLoading_(false);
        }
      }

      function getGeneralPayload() {
        return {
          autor: document.getElementById('autor').value,
          descricao: document.getElementById('descricao').value,
        };
      }

      function getMedicinePayload() {
        return {
          tipo: document.getElementById('tipo').value,
          medicamento: document.getElementById('medicamento').value,
          precoVenda: document.getElementById('precoVenda').value,
          prePago: document.getElementById('prePago').checked,
          cliente: document.getElementById('cliente').value,
          telefone: document.getElementById('telefone').value,
          atendente: document.getElementById('atendente').value,
          previsaoEntrega: document.getElementById('previsaoEntrega').value,
        };
      }

      function validatePayload(tab, payload) {
        if (tab === 'Geral') {
          if (!payload.autor.trim()) return 'Informe o autor.';
          if (!payload.descricao.trim()) return 'Informe a descrição.';
        }

        if (tab === 'Medicamentos') {
          if (!payload.medicamento.trim()) return 'Informe o medicamento.';
          if (!payload.cliente.trim()) return 'Informe o cliente.';
          if (!payload.telefone.trim()) return 'Informe o telefone do cliente.';
          if (!payload.atendente.trim()) return 'Informe o atendente.';
          if (!payload.previsaoEntrega) return 'Informe a previsão de entrega.';
        }

        return '';

          previewWindow = window.open('about:blank', '_blank');

            .withSuccessHandler(function (response) {

              if (previewWindow) {

            .withFailureHandler(function (error) {
              if (previewWindow) {
                previewWindow.close();

              setStatus(queueStatus, getErrorMessage(error), true);
              setQueueButtonsDisabled(false);

        setStatus(queueStatus, message);
        setQueueButtonsDisabled(true);

        try {
          getScriptRunner_()
            .withSuccessHandler(function (response) {
              dashboardData = normalizeData(response.items);
              renderAll();
              setStatus(queueStatus, 'Fila operacional atualizada.');
              setQueueButtonsDisabled(false);
            })
            .withFailureHandler(function (error) {
              setStatus(queueStatus, getErrorMessage(error), true);
              setQueueButtonsDisabled(false);
            })
            [functionName](id);
        } catch (error) {
          setStatus(queueStatus, error.message, true);
          setQueueButtonsDisabled(false);

      }

      function setFormLoading_(isLoading) {
        saveButton.disabled = isLoading;
      }

      function setQueueButtonsDisabled(disabled) {
        queueList.querySelectorAll('[data-queue-action]').forEach(function (button) {
          button.disabled = disabled;
        });
      }

      function setChecklistButtonsDisabled(disabled) {
        if (checklistGenerateBtn) {
          checklistGenerateBtn.disabled = disabled;
        }
        if (checklistToggleBtn) {
          checklistToggleBtn.disabled = disabled;
        }
        checklistCategories.querySelectorAll('[data-check-action], button').forEach(function (button) {
          button.disabled = disabled;
        });

      function normalizeData(data) {
        return {
          geral: Array.isArray(data && data.geral) ? data.geral : [],
          medicamentos: Array.isArray(data && data.medicamentos) ? data.medicamentos : [],
          checklistTurno: normalizeChecklistData_(data && data.checklistTurno),
        };
      }

      function normalizeChecklistData_(checklist) {
        const items = Array.isArray(checklist && checklist.items) ? checklist.items : [];
        const summary =
          checklist && checklist.summary && typeof checklist.summary === 'object'
            ? checklist.summary
            : buildChecklistSummary_(items);

        return {
          data: checklist && checklist.data ? checklist.data : '',
          turno: checklist && checklist.turno ? checklist.turno : 'Manhã',
          horarioReferencia:
            checklist && checklist.horarioReferencia ? checklist.horarioReferencia : '07:00',
          isAfterDeadline: Boolean(checklist && checklist.isAfterDeadline),
          items: items,
          summary: {
            totalItens: Number(summary.totalItens || 0),
            itensFeitos: Number(summary.itensFeitos || 0),
            itensNaoAplicaveis: Number(summary.itensNaoAplicaveis || 0),
            itensPendentes: Number(summary.itensPendentes || 0),
            percentualConcluido: Number(summary.percentualConcluido || 0),
          },
        };
      }

      function getScriptRunner_() {
        if (
          typeof google === 'undefined' ||
          !google.script ||
          !google.script.run ||
          typeof google.script.run.withSuccessHandler !== 'function'
        ) {
          throw new Error('Ação disponível apenas no Web App publicado.');
        }
        return google.script.run;
      }

      function parseInitialDataB64(encoded) {
        if (!encoded) {
          return normalizeData({});
        }

        try {
          const normalized = String(encoded).replace(/-/g, '+').replace(/_/g, '/');
          const paddingLength = (4 - (normalized.length % 4)) % 4;
          const padded = normalized + '='.repeat(paddingLength);
          const binary = atob(padded);
          let jsonText = '';

          if (typeof TextDecoder !== 'undefined') {
            const bytes = Uint8Array.from(binary, function (char) {
              return char.charCodeAt(0);
            });
            jsonText = new TextDecoder('utf-8').decode(bytes);
          } else {
            jsonText = decodeURIComponent(
              Array.prototype.map
                .call(binary, function (char) {
                  return '%' + ('00' + char.charCodeAt(0).toString(16)).slice(-2);
                })
                .join('')
            );
          }

          return normalizeData(JSON.parse(jsonText));
        } catch (error) {
          console.error('Falha ao carregar dados iniciais.', error);
          return normalizeData({});
        }
      }

      function normalizePriceInput_(value) {
        if (value === null || value === undefined || String(value).trim() === '') {
          return { value: '', error: '' };
        }

        let normalized = String(value).trim();
        normalized = normalized.replace(/\s/g, '').replace(/^R\$/i, '');
        if (!normalized) {
          return { value: '', error: '' };
        }
        if (normalized.indexOf('-') === 0) {
          return { value: '', error: 'Preço de venda não pode ser negativo.' };
        }

        if (normalized.indexOf(',') >= 0 && normalized.indexOf('.') >= 0) {
          normalized = normalized.replace(/\./g, '').replace(',', '.');
        } else if (normalized.indexOf(',') >= 0) {
          normalized = normalized.replace(',', '.');
        }

        const parsed = Number(normalized);
        if (Number.isNaN(parsed)) {
          return { value: '', error: 'Preço de venda inválido. Informe um valor numérico válido.' };
        }
        if (parsed < 0) {
          return { value: '', error: 'Preço de venda não pode ser negativo.' };
        }

        return { value: Math.round(parsed * 100) / 100, error: '' };
      }

      function formatCurrencyBr_(value) {
        const normalized = normalizePriceInput_(value);
        if (normalized.error || normalized.value === '') {
          return '';
        }
        return Number(normalized.value).toLocaleString('pt-BR', {
          style: 'currency',
          currency: 'BRL',
        });
      }

      function isOverdue(item) {
        if (!item.Previsao_Entrega || item.Entregue) {
          return false;
        }
        const today = new Date();
        today.setHours(0, 0, 0, 0);
        const forecast = new Date(item.Previsao_Entrega + 'T00:00:00');
        forecast.setHours(0, 0, 0, 0);
        return today.getTime() >= forecast.getTime();
      }

      function parseDateTime_(value) {
        const date = new Date(value);
        return Number.isNaN(date.getTime()) ? 0 : date.getTime();
      }

      function setStatus(element, message, isError) {
        if (!element) return;
        element.textContent = message || '';
        element.classList.toggle('error', Boolean(isError));
      }

      function clearStatus(element) {
        setStatus(element, '', false);
      }

      function getErrorMessage(error) {
        return error && error.message ? error.message : 'Ocorreu um erro inesperado.';
      }

      function canShowWhatsAppButton(item) {
        const status = String(item.Status || '')
          .trim()
          .toLowerCase();
        return Boolean(item.Comprado) || Boolean(item.Entregue) || status === 'resolvido parcialmente';
      }

      function formatDateTime(value) {
        if (!value) return '-';
        const date = new Date(value);
        if (Number.isNaN(date.getTime())) return String(value);
        return date.toLocaleString('pt-BR');
      }

      function formatDate(value) {
        if (!value) return '';
        const date = new Date(value + 'T00:00:00');
        if (Number.isNaN(date.getTime())) return String(value);
        return date.toLocaleDateString('pt-BR');
      }

      function escapeHtml(value) {
        return String(value == null ? '' : value)
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;')
          .replace(/'/g, '&#039;');
      }

      function escapeAttribute(value) {
        return escapeHtml(value).replace(/\\/g, '\\\\');
      }
    </script>
  </body>
