<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <base target="_top">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Handover - Drogarias Conceito</title>
    <style>
      :root {
        --bg: #f3f5f8;
        --card: #ffffff;
        --border: #d5d9e0;
        --text: #1f2937;
        --muted: #6b7280;
        --primary: #2563eb;
        --primary-dark: #1d4ed8;
        --success: #15803d;
        --warning: #b45309;
        --danger: #b91c1c;
        --danger-bg: #fee2e2;
        --chip: #eef2ff;
      }

      * {
        box-sizing: border-box;
      }

      html {
        max-width: 100%;
        overflow-x: hidden;
      }

      body {
        margin: 0;
        max-width: 100%;
        background: var(--bg);
        color: var(--text);
        font-family: Arial, Helvetica, sans-serif;
        overflow-x: hidden;
      }

      .page {
        min-width: 0;
        max-width: 1120px;
        width: 100%;
        margin: 0 auto;
        padding: 16px;
      }

      .toolbar,
      .filter-group,
      .queue-list,
      .checklist-categories {
        min-width: 0;
      }

      .header {
        margin-bottom: 12px;
      }

      .header h1 {
        font-size: 24px;
        margin: 0 0 4px;
      }

      .header p {
        margin: 0;
        color: var(--muted);
      }

      .card {
        min-width: 0;
        width: 100%;
        max-width: 100%;
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 12px;
        box-shadow: 0 6px 18px rgba(15, 23, 42, 0.06);
      }

      .summary-grid {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 8px;
        margin-bottom: 10px;
      }

      .summary-box {
        background: #fff;
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 10px;
      }

      .summary-box .label {
        color: var(--muted);
        font-size: 11px;
        font-weight: 700;
        text-transform: uppercase;
      }

      .summary-box .value {
        font-size: 22px;
        font-weight: 700;
        margin-top: 4px;
      }

      .summary-box .sub {
        color: var(--muted);
        font-size: 12px;
        margin-top: 2px;
      }

      .toolbar {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 10px;
      }

      .filter-group {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
      }

      .filter-button {
        border: 1px solid var(--border);
        border-radius: 999px;
        background: #fff;
        color: var(--text);
        cursor: pointer;
        font-size: 12px;
        font-weight: 700;
        padding: 8px 12px;
      }

      .filter-button.active {
        background: var(--chip);
        border-color: #99a5d8;
        color: #1e3a8a;
      }

      .toolbar-actions {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
      }

      button {
        border: 0;
        border-radius: 8px;
        background: var(--primary);
        color: #fff;
        cursor: pointer;
        font-size: 13px;
        font-weight: 700;
        padding: 9px 11px;
      }

      button:hover {
        background: var(--primary-dark);
      }

      button.secondary {
        background: var(--success);
      }

      button.warning {
        background: #f59e0b;
        color: #1f2937;
      }

      button.light {
        background: #e5e7eb;
        color: var(--text);
      }

      button.whatsapp {
        background: #16a34a;
      }

      button.whatsapp:hover {
        background: #15803d;
      }

      button:disabled {
        opacity: 0.6;
        cursor: not-allowed;
      }

      .status {
        color: var(--muted);
        font-size: 12px;
        min-height: 18px;
        margin-top: 8px;
      }

      .status.error {
        color: var(--danger);
      }

      .queue-title {
        margin: 0 0 6px;
        font-size: 18px;
      }

      .queue-subtitle {
        margin: 0 0 8px;
        color: var(--muted);
        font-size: 12px;
      }

      .queue-list {
        display: grid;
        gap: 8px;
      }

      .queue-card {
        min-width: 0;
        width: 100%;
        max-width: 100%;
        border: 1px solid var(--border);
        border-radius: 10px;
        background: #fff;
        padding: 10px;
      }

      .queue-card.overdue {
        border-color: #ef4444;
        background: #fef2f2;
      }

      .queue-head {
        display: flex;
        justify-content: space-between;
        gap: 8px;
        align-items: flex-start;
        margin-bottom: 6px;
      }

      .badge {
        display: inline-block;
        border-radius: 999px;
        background: var(--chip);
        color: #1e3a8a;
        font-size: 11px;
        font-weight: 700;
        padding: 4px 8px;
      }

      .badge.status-pendente {
        background: #fee2e2;
        color: #991b1b;
      }

      .badge.status-comprado {
        background: #fef3c7;
        color: #92400e;
      }

      .badge.status-entregue,
      .badge.status-feito {
        background: #dcfce7;
        color: #166534;
      }

      .badge.status-na {
        background: #e5e7eb;
        color: #374151;
      }

      .queue-time {
        color: var(--muted);
        font-size: 11px;
      }

      .queue-title-main {
        font-size: 15px;
        font-weight: 700;
      }

      .queue-desc {
        color: var(--muted);
        font-size: 12px;
        margin-top: 2px;
      }

      .queue-meta {
        color: var(--muted);
        font-size: 12px;
        margin-top: 6px;
      }

      .queue-actions {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        margin-top: 8px;
      }

      .queue-actions button {
        font-size: 12px;
        margin: 0;
        padding: 7px 10px;
      }

      .section-title {
        margin: 0 0 8px;
        font-size: 18px;
      }

      .checklist-top {
        display: flex;
        justify-content: space-between;
        gap: 8px;
        align-items: center;
        margin-bottom: 8px;
      }

      .checklist-summary {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        margin-bottom: 8px;
      }

      .checklist-chip {
        border-radius: 999px;
        background: var(--chip);
        color: #1e3a8a;
        font-size: 11px;
        font-weight: 700;
        padding: 5px 9px;
      }

      .checklist-chip.alert {
        background: var(--danger-bg);
        color: var(--danger);
      }

      .checklist-hint {
        color: var(--muted);
        font-size: 12px;
        margin: 4px 0 8px;
      }

      .checklist-categories {
        display: grid;
        gap: 8px;
      }

      .checklist-category {
        min-width: 0;
        max-width: 100%;
        border: 1px solid var(--border);
        border-radius: 10px;
        background: #fff;
      }

      .checklist-category-head {
        display: flex;
        justify-content: space-between;
        gap: 8px;
        align-items: center;
        width: 100%;
        border: 0;
        border-radius: 10px 10px 0 0;
        background: #f8fafc;
        color: var(--text);
        font-size: 12px;
        text-align: left;
        padding: 8px 10px;
      }

      .checklist-category-head:hover {
        background: #f1f5f9;
      }

      .checklist-category-meta {
        color: var(--muted);
        font-size: 11px;
        white-space: nowrap;
      }

      .checklist-items {
        padding: 8px;
        display: grid;
        gap: 7px;
      }

      .check-item {
        border: 1px solid var(--border);
        border-radius: 8px;
        background: #fff;
        padding: 8px;
      }

      .check-item.late {
        border-color: #ef4444;
        background: #fef2f2;
      }

      .check-item-title {
        font-size: 13px;
        font-weight: 700;
      }

      .check-item-desc {
        color: var(--muted);
        font-size: 12px;
        margin-top: 2px;
      }

      .check-item-meta {
        color: var(--muted);
        font-size: 11px;
        margin-top: 5px;
      }

      .check-actions {
        display: flex;
        flex-wrap: wrap;
        gap: 5px;
        margin-top: 6px;
      }

      .check-actions button {
        font-size: 11px;
        padding: 6px 8px;
      }

      .check-actions button.active {
        outline: 2px solid rgba(37, 99, 235, 0.35);
      }

      .obs-bar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-top: 6px;
        gap: 8px;
      }

      .obs-flag {
        color: #0f766e;
        font-size: 11px;
        font-weight: 700;
      }

      .obs-panel {
        display: flex;
        gap: 6px;
        margin-top: 6px;
      }

      .obs-panel input {
        border: 1px solid var(--border);
        border-radius: 8px;
        font: inherit;
        font-size: 12px;
        padding: 8px;
        width: 100%;
      }

      .obs-panel button {
        font-size: 12px;
      }

      .form-grid {
        display: grid;
        gap: 10px;
      }

      .field label {
        display: block;
        font-size: 12px;
        font-weight: 700;
        margin-bottom: 4px;
      }

      .field input,
      .field select,
      .field textarea {
        border: 1px solid var(--border);
        border-radius: 8px;
        font: inherit;
        padding: 9px;
        width: 100%;
      }

      .field textarea {
        min-height: 90px;
        resize: vertical;
      }

      .checkbox-row {
        display: flex;
        align-items: center;
        gap: 6px;
      }

      .checkbox-row input {
        width: auto;
      }

      .form-actions {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
      }

      .hidden {
        display: none !important;
      }

      #toast-root {
        position: fixed;
        right: 16px;
        bottom: 16px;
        z-index: 9999;
        display: flex;
        flex-direction: column;
        gap: 8px;
        max-width: min(360px, calc(100vw - 32px));
        pointer-events: none;
      }

      .toast-msg {
        pointer-events: none;
        background: #1f2937;
        color: #fff;
        padding: 10px 14px;
        border-radius: 10px;
        font-size: 13px;
        font-weight: 600;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.18);
        animation: toast-in 0.2s ease-out;
      }

      .toast-msg.error {
        background: var(--danger);
      }

      @keyframes toast-in {
        from {
          opacity: 0;
          transform: translateY(8px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .queue-card.syncing {
        outline: 2px dashed #93c5fd;
      }

      .queue-card.sync-error {
        outline: 2px solid var(--danger);
      }

      .check-item.syncing {
        opacity: 0.85;
      }

      .check-actions button.correction {
        font-size: 11px;
        padding: 5px 8px;
        font-weight: 600;
      }

      .operador-bar .field {
        margin: 0;
      }

      .operador-bar label {
        font-size: 12px;
        font-weight: 700;
        color: var(--muted);
      }

      .operador-bar input {
        width: 100%;
        max-width: 420px;
        border: 1px solid var(--border);
        border-radius: 8px;
        font: inherit;
        padding: 8px;
      }

      .checklist-filters .filter-button {
        font-size: 11px;
        padding: 6px 10px;
      }

      .filter-button:disabled {
        opacity: 0.55;
        cursor: wait;
      }

      .modal-overlay {
        position: fixed;
        inset: 0;
        z-index: 10000;
        background: rgba(15, 23, 42, 0.45);
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 16px;
      }

      .modal-overlay.hidden {
        display: none !important;
      }

      .modal-dialog {
        max-height: min(92vh, 900px);
        overflow-y: auto;
        width: min(520px, 100%);
        position: relative;
        margin: 0;
      }

      .modal-head {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 10px;
      }

      .modal-head h2 {
        margin: 0;
        font-size: 1.15rem;
      }

      .modal-icon-btn {
        border: 0;
        background: transparent;
        font-size: 26px;
        line-height: 1;
        cursor: pointer;
        color: var(--muted);
        padding: 0 4px;
      }

      .modal-icon-btn:hover {
        color: var(--text);
      }

      .date-shortcuts {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        margin-top: 6px;
      }

      .date-shortcuts button {
        font-size: 12px;
        padding: 6px 10px;
      }

      .empty-box {
        color: var(--muted);
        border: 1px dashed var(--border);
        border-radius: 8px;
        font-size: 13px;
        padding: 10px;
      }

      @media (max-width: 900px) {
        .summary-grid {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }

        .toolbar {
          flex-direction: column;
          align-items: stretch;
        }

        .toolbar-actions {
          justify-content: flex-end;
        }
      }

      @media (max-width: 640px) {
        .page {
          padding: 10px;
        }

        .summary-grid {
          grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
        }

        .queue-head {
          flex-direction: column;
        }

        .queue-actions button,
        .check-actions button,
        .form-actions button,
        .toolbar-actions button {
          flex: 1 1 calc(50% - 6px);
        }

        .obs-panel {
          flex-direction: column;
        }
      }
    </style>
  </head>
  <body>
    <main class="page">
      <header class="header">
        <h1>Handover - Drogarias Conceito</h1>
        <p>Painel operacional para turno, pendências e medicamentos.</p>
      </header>

      <section id="operation-summary" class="summary-grid"></section>

      <section class="card operador-bar" style="margin-top: 10px;">
        <div class="field">
          <label for="operador-atual">Operador atual</label>
          <input
            id="operador-atual"
            type="text"
            name="operador-atual"
            autocomplete="name"
            placeholder="Nome usado em checklist e ações (salvo neste aparelho)"
          >
        </div>
      </section>

      <section class="toolbar card">
        <div class="filter-group" id="queue-filters">
          <button type="button" class="filter-button" data-filter="todos" onclick="setQueueFilter('todos')">
            Todos
          </button>
          <button type="button" class="filter-button active" data-filter="pendentes" onclick="setQueueFilter('pendentes')">
            Pendentes
          </button>
          <button type="button" class="filter-button" data-filter="comprados" onclick="setQueueFilter('comprados')">
            Comprados
          </button>
          <button type="button" class="filter-button" data-filter="entregues" onclick="setQueueFilter('entregues')">
            Entregues
          </button>
          <button
            type="button"
            class="filter-button"
            data-filter="resolvidos"
            onclick="setQueueFilter('resolvidos')"
          >
            Histórico / Resolvidos
          </button>
          <button
            type="button"
            class="filter-button"
            data-filter="resolvidos_parcialmente"
            onclick="setQueueFilter('resolvidos_parcialmente')"
          >
            Resolvidos parcialmente
          </button>
          <button
            type="button"
            class="filter-button"
            data-filter="comprados_sem_aviso"
            onclick="setQueueFilter('comprados_sem_aviso')"
          >
            Comprados sem aviso
          </button>
          <button
            type="button"
            class="filter-button"
            data-filter="vencidos_hoje"
            onclick="setQueueFilter('vencidos_hoje')"
          >
            Vencidos/Hoje
          </button>
        </div>
        <div class="toolbar-actions">
          <button id="toggle-form-btn" type="button" class="light" onclick="toggleFormPanel()">Novo registro</button>
        </div>
      </section>

      <section class="card" style="margin-top: 10px;">
        <h2 class="queue-title">Pendências operacionais</h2>
        <p id="queue-subtitle" class="queue-subtitle"></p>
        <div id="queue-list" class="queue-list"></div>
        <div id="queue-empty" class="empty-box hidden">Nenhuma pendência para o filtro selecionado.</div>
        <div id="queue-status" class="status" aria-live="polite"></div>
      </section>

      <section class="card" style="margin-top: 10px;">
        <div class="checklist-top">
          <h2 class="section-title">Checklist do Turno</h2>
          <button id="checklist-toggle-btn" type="button" class="light" onclick="toggleChecklistPanel()">
            Abrir checklist
          </button>
        </div>

        <div id="checklist-summary" class="checklist-summary"></div>
        <p id="checklist-generate-hint" class="checklist-hint"></p>

        <div class="filter-group checklist-filters" style="margin-bottom: 8px; flex-wrap: wrap;">
          <button
            type="button"
            class="filter-button active"
            data-check-filter="todos"
            onclick="setChecklistFilter('todos')"
          >
            Todos
          </button>
          <button type="button" class="filter-button" data-check-filter="pendentes" onclick="setChecklistFilter('pendentes')">
            Pendentes
          </button>
          <button type="button" class="filter-button" data-check-filter="feitos" onclick="setChecklistFilter('feitos')">
            Feitos
          </button>
          <button type="button" class="filter-button" data-check-filter="na" onclick="setChecklistFilter('na')">
            Não aplicáveis
          </button>
          <button
            type="button"
            class="filter-button"
            data-check-filter="feitos_hoje"
            onclick="setChecklistFilter('feitos_hoje')"
          >
            Feitos hoje
          </button>
        </div>

        <div class="toolbar-actions" style="margin-bottom: 8px;">
          <button id="checklist-generate-btn" type="button" class="light" onclick="refreshChecklistToday()">
            Atualizar visualização
          </button>
        </div>

        <div id="checklist-content" class="hidden">
          <div id="checklist-categories" class="checklist-categories"></div>
        </div>
        <div id="checklist-status" class="status" aria-live="polite"></div>
      </section>
    </main>

    <div id="form-modal-overlay" class="modal-overlay hidden" aria-hidden="true">
      <div class="modal-dialog card" role="dialog" aria-modal="true" aria-labelledby="form-modal-title">
        <div class="modal-head">
          <h2 id="form-modal-title">Novo registro</h2>
          <button type="button" id="form-modal-close" class="modal-icon-btn" aria-label="Fechar">×</button>
        </div>
        <form id="request-form" class="form-grid">
          <div class="field">
            <label for="category">Categoria</label>
            <select id="category" name="category">
              <option value="Geral">Geral</option>
              <option value="Medicamentos">Medicamentos</option>
            </select>
          </div>

          <div id="general-fields">
            <div class="field">
              <label for="tituloGeral">Título / Assunto</label>
              <input id="tituloGeral" name="tituloGeral" type="text" placeholder="Resumo curto da solicitação">
            </div>
            <div class="field">
              <label for="urgenciaGeral">Urgência</label>
              <select id="urgenciaGeral" name="urgenciaGeral">
                <option value="Normal">Normal</option>
                <option value="Urgente">Urgente</option>
              </select>
            </div>
            <div class="field">
              <label for="autor">Autor</label>
              <input id="autor" name="autor" autocomplete="name" readonly title="Preenchido pelo Operador atual">
            </div>
            <div class="field">
              <label for="descricao">Descrição</label>
              <textarea id="descricao" name="descricao"></textarea>
            </div>
          </div>

          <div id="medicine-fields" class="hidden">
            <div class="field">
              <label for="tipo">Tipo</label>
              <select id="tipo" name="tipo">
                <option value="Encomenda">Encomenda</option>
                <option value="Falta">Falta</option>
              </select>
            </div>

            <div class="field">
              <label for="medicamento">Medicamento</label>
              <input id="medicamento" name="medicamento">
            </div>

            <div class="field" id="preco-venda-field">
              <label for="precoVenda">Preço de venda</label>
              <input id="precoVenda" name="precoVenda" type="text" inputmode="decimal" placeholder="R$ 0,00">
            </div>

            <div class="checkbox-row field">
              <input id="prePago" name="prePago" type="checkbox">
              <label for="prePago" style="margin:0;">Pré-pago</label>
            </div>

            <div class="field">
              <label for="cliente">Cliente</label>
              <input id="cliente" name="cliente">
            </div>

            <div class="field">
              <label for="telefone">Telefone</label>
              <input id="telefone" name="telefone" placeholder="(11) 91234-5678">
            </div>

            <div class="field">
              <label for="atendente">Atendente</label>
              <input id="atendente" name="atendente">
            </div>

            <div class="field">
              <label for="previsaoEntrega">Previsão de entrega</label>
              <input id="previsaoEntrega" name="previsaoEntrega" type="date">
              <div class="date-shortcuts">
                <button type="button" class="light" onclick="setPrevisaoOffsetDays(1)">Amanhã</button>
                <button type="button" class="light" onclick="setPrevisaoOffsetDays(2)">Depois de amanhã</button>
                <button type="button" class="light" onclick="setPrevisaoOffsetDays(7)">Semana que vem</button>
              </div>
            </div>
          </div>

          <div class="form-actions">
            <button id="save-button" type="submit">Salvar</button>
            <button type="button" id="form-modal-cancel" class="light">Cancelar</button>
          </div>
          <div id="form-status" class="status" aria-live="polite"></div>
        </form>
      </div>
    </div>

    <div id="toast-root" aria-live="polite"></div>

    <script>
      const OPERADOR_STORAGE_KEY = 'handover_operador_atual_v14';
      const QUEUE_FILTERS = [
        'todos',
        'pendentes',
        'comprados',
        'entregues',
        'resolvidos',
        'resolvidos_parcialmente',
        'comprados_sem_aviso',
        'vencidos_hoje',
      ];

      const CHECKLIST_VIEW_FILTERS = ['todos', 'pendentes', 'feitos', 'na', 'feitos_hoje'];

      const checklistObservationDrafts = Object.create(null);

      let dashboardData = parseInitialDataB64('<?= initialDataB64 ?>');
      let activeQueueFilter = 'pendentes';
      let activeChecklistFilter = 'todos';
      let historicoResolvidos = [];
      let historicoLoadState = 'idle';
      let checklistPendingItemId = null;
      let isChecklistExpanded = false;
      const openChecklistCategories = new Set();
      const openChecklistObservations = new Set();

      const formModalOverlay = document.getElementById('form-modal-overlay');
      const formModalCloseBtn = document.getElementById('form-modal-close');
      const formModalCancelBtn = document.getElementById('form-modal-cancel');
      const toggleFormBtn = document.getElementById('toggle-form-btn');
      const requestForm = document.getElementById('request-form');
      const categorySelect = document.getElementById('category');
      const tipoSelect = document.getElementById('tipo');
      const generalFields = document.getElementById('general-fields');
      const medicineFields = document.getElementById('medicine-fields');
      const precoVendaField = document.getElementById('preco-venda-field');
      const formStatus = document.getElementById('form-status');
      const saveButton = document.getElementById('save-button');

      const summaryContainer = document.getElementById('operation-summary');
      const queueList = document.getElementById('queue-list');
      const queueEmpty = document.getElementById('queue-empty');
      const queueStatus = document.getElementById('queue-status');
      const queueSubtitle = document.getElementById('queue-subtitle');

      const checklistToggleBtn = document.getElementById('checklist-toggle-btn');
      const checklistSummary = document.getElementById('checklist-summary');
      const checklistHint = document.getElementById('checklist-generate-hint');
      const checklistContent = document.getElementById('checklist-content');
      const checklistCategories = document.getElementById('checklist-categories');
      const checklistStatus = document.getElementById('checklist-status');
      const checklistGenerateBtn = document.getElementById('checklist-generate-btn');
      const operadorAtualInput = document.getElementById('operador-atual');

      ensureChecklistObservationDelegation_();

      categorySelect.addEventListener('change', updateVisibleFields);
      if (tipoSelect) {
        tipoSelect.addEventListener('change', updateMedicinePriceVisibility_);
      }
      requestForm.addEventListener('submit', handleSubmit);
      requestForm.addEventListener('reset', function () {
        setTimeout(function () {
          updateVisibleFields();
          updateMedicinePriceVisibility_();
        }, 0);
      });

      if (formModalCloseBtn) {
        formModalCloseBtn.addEventListener('click', closeFormModal_);
      }
      if (formModalCancelBtn) {
        formModalCancelBtn.addEventListener('click', closeFormModal_);
      }
      document.addEventListener('keydown', function (event) {
        if (event.key === 'Escape' && formModalOverlay && !formModalOverlay.classList.contains('hidden')) {
          closeFormModal_();
        }
      });

      initOperadorBar_();
      updateMedicinePriceVisibility_();

      function initOperadorBar_() {
        if (!operadorAtualInput) {
          return;
        }
        try {
          operadorAtualInput.value = localStorage.getItem(OPERADOR_STORAGE_KEY) || '';
        } catch (e) {
          operadorAtualInput.value = '';
        }
        operadorAtualInput.addEventListener('change', function () {
          try {
            localStorage.setItem(OPERADOR_STORAGE_KEY, operadorAtualInput.value.trim());
          } catch (err) {
            console.warn('Handover: localStorage indisponível.', err);
          }
          syncAutorFieldFromOperador_();
        });
        operadorAtualInput.addEventListener('input', function () {
          syncAutorFieldFromOperador_();
        });
      }

      function getOperadorAtual_() {
        return operadorAtualInput ? operadorAtualInput.value.trim() : '';
      }

      function ensureOperadorForCriticalAction_() {
        var op = getOperadorAtual_();
        if (op) {
          return op;
        }
        var prompted = window.prompt('Informe o operador atual (nome):', '');
        prompted = String(prompted || '').trim();
        if (!prompted) {
          return '';
        }
        if (operadorAtualInput) {
          operadorAtualInput.value = prompted;
        }
        try {
          localStorage.setItem(OPERADOR_STORAGE_KEY, prompted);
        } catch (err) {
          console.warn('Handover: localStorage indisponível.', err);
        }
        return prompted;
      }

      function showToast_(message, isError) {
        var root = document.getElementById('toast-root');
        if (!root || !message) {
          return;
        }
        var node = document.createElement('div');
        node.className = 'toast-msg' + (isError ? ' error' : '');
        node.textContent = message;
        root.appendChild(node);
        window.setTimeout(function () {
          if (node.parentNode) {
            node.parentNode.removeChild(node);
          }
        }, 2400);
      }

      function perfLog_(label, startedAt) {
        try {
          console.debug('[Handover] ' + label + ' ms=', Date.now() - startedAt);
        } catch (e) {
          /* ignore */
        }
      }

      function normalizeBrazilPhoneClient_(phoneValue) {
        var digits = String(phoneValue || '')
          .replace(/\D/g, '')
          .replace(/^0+/, '');
        if (!digits) {
          return '';
        }
        if (digits.indexOf('55') === 0) {
          return digits.length === 12 || digits.length === 13 ? digits : '';
        }
        return digits.length === 10 || digits.length === 11 ? '55' + digits : '';
      }

      function buildWhatsAppMessageClient_(clientName, medicineName) {
        var name = String(clientName || '').trim() || 'cliente';
        var medicine = String(medicineName || '').trim() || 'informado';
        return [
          'Olá, ' + name + '. Seu medicamento ' + medicine + ' chegou na Drogarias Conceito.',
          '',
          'Pode retirar na loja hoje.',
          '',
          'Se preferir, responda esta mensagem que verificamos a melhor forma de entrega.',
        ].join('\n');
      }

      function updateMedicinePriceVisibility_() {
        if (!precoVendaField || !tipoSelect) {
          return;
        }
        var isFalta = String(tipoSelect.value || '').toLowerCase() === 'falta';
        precoVendaField.classList.toggle('hidden', isFalta);
        if (isFalta) {
          var pv = document.getElementById('precoVenda');
          if (pv) {
            pv.value = '';
          }
        }
      }

      function medicationTipoFromRecord_(item) {
        return String((item && item.Tipo) || '')
          .trim()
          .toLowerCase();
      }

      function upsertMedicamento_(record) {
        if (!record || !record.ID) {
          return;
        }
        var list = dashboardData.medicamentos || [];
        var idx = list.findIndex(function (m) {
          return m.ID === record.ID;
        });
        if (idx >= 0) {
          list[idx] = record;
        } else {
          list.unshift(record);
        }
        dashboardData.medicamentos = list;
      }

      function removeMedicamentoById_(id) {
        dashboardData.medicamentos = (dashboardData.medicamentos || []).filter(function (m) {
          return m.ID !== id;
        });
      }

      function upsertGeral_(record) {
        if (!record || !record.ID) {
          return;
        }
        var list = dashboardData.geral || [];
        list.unshift(record);
        dashboardData.geral = list;
      }

      function removeGeralById_(id) {
        dashboardData.geral = (dashboardData.geral || []).filter(function (g) {
          return g.ID !== id;
        });
      }

      function applyChecklistPatch_(patch) {
        if (!patch || !patch.checklistItem || !patch.checklistItem.ID) {
          return;
        }
        var items = dashboardData.checklistTurno.items || [];
        var idx = items.findIndex(function (i) {
          return checklistDraftKey_(i.ID) === checklistDraftKey_(patch.checklistItem.ID);
        });
        if (idx >= 0) {
          items[idx] = patch.checklistItem;
        }
        if (patch.checklistSummary && typeof patch.checklistSummary === 'object') {
          dashboardData.checklistTurno.summary = {
            totalItens: Number(patch.checklistSummary.totalItens || 0),
            itensFeitos: Number(patch.checklistSummary.itensFeitos || 0),
            itensNaoAplicaveis: Number(patch.checklistSummary.itensNaoAplicaveis || 0),
            itensPendentes: Number(patch.checklistSummary.itensPendentes || 0),
            percentualConcluido: Number(patch.checklistSummary.percentualConcluido || 0),
          };
        }
      }

      function loadHistoricoIfNeeded_(callback) {
        if (historicoLoadState === 'ready') {
          callback();
          return;
        }
        if (historicoLoadState === 'loading') {
          var attempts = 0;
          var timer = window.setInterval(function () {
            attempts += 1;
            if (historicoLoadState === 'ready') {
              window.clearInterval(timer);
              callback();
            } else if (attempts > 600) {
              window.clearInterval(timer);
              callback();
            }
          }, 100);
          return;
        }
        historicoLoadState = 'loading';
        var started = Date.now();
        try {
          getScriptRunner_()
            .withSuccessHandler(function (resp) {
              historicoResolvidos = resp && resp.historico ? resp.historico : [];
              historicoLoadState = 'ready';
              perfLog_('fetchHistoricoResolvidos', started);
              callback();
            })
            .withFailureHandler(function (err) {
              historicoLoadState = 'idle';
              perfLog_('fetchHistoricoResolvidos_fail', started);
              showToast_(getErrorMessage(err), true);
              callback();
            })
            .fetchHistoricoResolvidos(120);
        } catch (err) {
          historicoLoadState = 'idle';
          showToast_(getErrorMessage(err), true);
          callback();
        }
      }

      function filterChecklistItemsForView_(items) {
        var checklist = dashboardData.checklistTurno || {};
        var todayKey = checklist.data || '';
        switch (activeChecklistFilter) {
          case 'pendentes':
            return items.filter(function (item) {
              return formatChecklistStatus_(item.Status) === 'Pendente';
            });
          case 'feitos':
            return items.filter(function (item) {
              return formatChecklistStatus_(item.Status) === 'Feito';
            });
          case 'na':
            return items.filter(function (item) {
              return formatChecklistStatus_(item.Status) === 'Não aplicável';
            });
          case 'feitos_hoje':
            return items.filter(function (item) {
              if (formatChecklistStatus_(item.Status) !== 'Feito') {
                return false;
              }
              var ts = String(item.Data_Hora_Check || '');
              return todayKey && ts.indexOf(todayKey) === 0;
            });
          case 'todos':
          default:
            return items.slice();
        }
      }

      function setChecklistFilter(filterKey) {
        if (CHECKLIST_VIEW_FILTERS.indexOf(filterKey) === -1) {
          return;
        }
        activeChecklistFilter = filterKey;
        document.querySelectorAll('[data-check-filter]').forEach(function (button) {
          button.classList.toggle('active', button.dataset.checkFilter === filterKey);
        });
        renderChecklistSection();
      }

      renderAll();

      function renderAll() {
        renderSummary();
        renderQueue();
        renderChecklistSection();
      }

      function renderSummary() {
        const allQueueItems = buildWorkQueueItems(dashboardData);
        const pendingQueue = allQueueItems.filter(function (item) {
          return item.statusKey === 'pendente';
        });
        const medicationPending = allQueueItems.filter(function (item) {
          return item.type === 'medicamento' && item.statusKey === 'pendente';
        });
        const boughtWithoutWhatsapp = allQueueItems.filter(function (item) {
          return item.type === 'medicamento' && item.statusKey === 'comprado' && item.whatsappNotSent;
        });
        const checklist = dashboardData.checklistTurno;
        const checklistSummaryData = checklist.summary || {
          totalItens: 0,
          itensFeitos: 0,
          itensPendentes: 0,
          percentualConcluido: 0,
        };

        summaryContainer.innerHTML = [
          buildSummaryBox_('Pendências', pendingQueue.length, 'Fila de trabalho ativa'),
          buildSummaryBox_('Medicamentos pendentes', medicationPending.length, 'Aguardando ação'),
          buildSummaryBox_('Comprados sem aviso', boughtWithoutWhatsapp.length, 'Prioridade de WhatsApp'),
          buildSummaryBox_(
            'Checklist manhã',
            checklistSummaryData.percentualConcluido + '%',
            checklistSummaryData.itensPendentes + ' pendente(s)'
          ),
        ].join('');
      }

      function buildSummaryBox_(label, value, sub) {
        return (
          '<div class="summary-box">' +
          '<div class="label">' +
          escapeHtml(label) +
          '</div>' +
          '<div class="value">' +
          escapeHtml(value) +
          '</div>' +
          '<div class="sub">' +
          escapeHtml(sub) +
          '</div>' +
          '</div>'
        );
      }

      function buildAuditMetaLine_(item) {
        if (!item) {
          return '';
        }
        var parts = [];
        if (item.Ultima_Acao_Por) {
          parts.push(
            'Última ação: ' +
              item.Ultima_Acao_Por +
              (item.Ultima_Acao_Em ? ' às ' + formatDateTime(item.Ultima_Acao_Em) : '')
          );
        }
        if (item.Resolvido_Por) {
          parts.push(
            'Resolvido por: ' +
              item.Resolvido_Por +
              (item.Data_Resolucao ? ' (' + formatDateTime(item.Data_Resolucao) + ')' : '')
          );
        }
        return parts.join(' | ');
      }

      function geralQueueTitleFromItem_(item) {
        var t = String(item.Titulo || '').trim();
        if (t) return t;
        t = String(item.Assunto || '').trim();
        if (t) return t;
        var d = String(item.Descricao || '').trim();
        if (d.length > 80) return d.substring(0, 79) + '\u2026';
        if (d) return d;
        return 'Solicitação geral';
      }

      function geralQueueUrgenciaFromItem_(item) {
        var u = String(item.Urgencia || '').trim();
        return u || 'Normal';
      }

      function buildHistoricoQueueItems_(rows) {
        return (rows || []).map(function (item) {
          var origem = String(item.Origem || '');
          var audit = buildAuditMetaLine_(item);
          var base = {
            id: item.ID,
            type: 'historico',
            isOverdue: false,
            whatsappNotSent: false,
            actions: [],
            syncState: '',
            syncError: '',
            extraMeta:
              (audit ? audit + ' | ' : '') +
              'Arquivado: ' +
              (item.Arquivado_Em ? formatDateTime(item.Arquivado_Em) : '-'),
          };

          if (origem === 'Geral') {
            var ht = geralQueueTitleFromItem_(item);
            var hu = geralQueueUrgenciaFromItem_(item);
            return Object.assign({}, base, {
              originLabel: 'Histórico · Geral',
              statusLabel: 'Resolvido',
              statusKey: 'historico_resolvido',
              title: ht,
              description:
                'Autor: ' +
                (item.Autor || '-') +
                ' · Urgência: ' +
                hu +
                ' · Descrição: ' +
                (item.Descricao || '-'),
              person: item.Autor || '-',
              forecast: '',
              price: '',
              timeLabel: formatDateTime(item.Timestamp),
              timeSort: parseDateTime_(item.Timestamp),
            });
          }

          return Object.assign({}, base, {
            originLabel: 'Histórico · Medicamentos',
            statusLabel: String(item.Status || 'Arquivado'),
            statusKey: 'historico_med',
            title: item.Medicamento || 'Medicamento',
            description:
              'Tipo: ' +
              (item.Tipo || '-') +
              ' | Cliente: ' +
              (item.Cliente || '-') +
              ' | Atendente: ' +
              (item.Atendente || '-'),
            person: item.Cliente ? item.Cliente + ' / ' + (item.Atendente || '-') : item.Atendente || '-',
            forecast: item.Previsao_Entrega ? formatDate(item.Previsao_Entrega) : '',
            price: medicationTipoFromRecord_(item) === 'falta' ? '' : formatCurrencyBr_(item.Preco_Venda),
            timeLabel: formatDateTime(item.Timestamp),
            timeSort: parseDateTime_(item.Timestamp),
          });
        });
      }

      function buildQueueItemsForRender_() {
        if (activeQueueFilter === 'resolvidos') {
          return buildHistoricoQueueItems_(historicoResolvidos).sort(function (a, b) {
            var timeA = Number(a.timeSort || 0);
            var timeB = Number(b.timeSort || 0);
            return timeB - timeA;
          });
        }
        return filterQueueItems_(buildWorkQueueItems(dashboardData));
      }

      function renderQueue() {
        const queueItems = buildQueueItemsForRender_();
        queueList.innerHTML = '';
        queueEmpty.classList.toggle('hidden', queueItems.length !== 0);
        queueSubtitle.textContent =
          'Filtro atual: ' + humanizeQueueFilter_(activeQueueFilter) + ' (' + queueItems.length + ')';

        if (queueItems.length === 0) {
          return;
        }

        queueItems.forEach(function (item) {
          const card = document.createElement('article');
          var cardClass = 'queue-card' + (item.isOverdue ? ' overdue' : '');
          if (item.syncState === 'syncing') {
            cardClass += ' syncing';
          }
          if (item.syncState === 'error') {
            cardClass += ' sync-error';
          }
          card.className = cardClass;
          card.innerHTML = buildQueueCardHtml_(item);
          queueList.appendChild(card);
        });
      }

      function buildQueueCardHtml_(item) {
        const statusClass = item.statusKey ? ' status-' + item.statusKey : '';
        const badges = [
          '<span class="badge">' + escapeHtml(item.originLabel) + '</span>',
          '<span class="badge' + statusClass + '">' + escapeHtml(item.statusLabel) + '</span>',
        ];

        if (item.syncState === 'syncing') {
          badges.unshift('<span class="badge">Sincronizando...</span>');
        }
        if (item.syncState === 'error') {
          badges.unshift('<span class="badge status-pendente">Erro ao salvar</span>');
        }

        if (item.isOverdue) {
          badges.push('<span class="badge status-pendente">Atrasado/Hoje</span>');
        }

        const metaLines = [
          item.person ? 'Responsável/Cliente: ' + item.person : '',
          item.forecast ? 'Previsão: ' + item.forecast : '',
          item.price ? 'Preço de venda: ' + item.price : '',
          item.extraMeta || '',
        ].filter(Boolean);

        return (
          '<div class="queue-head">' +
          '<div>' +
          badges.join(' ') +
          '</div>' +
          '<div class="queue-time">' +
          escapeHtml(item.timeLabel) +
          '</div>' +
          '</div>' +
          '<div class="queue-title-main">' +
          escapeHtml(item.title) +
          '</div>' +
          '<div class="queue-desc">' +
          escapeHtml(item.description) +
          '</div>' +
          '<div class="queue-meta">' +
          escapeHtml(metaLines.join(' | ')) +
          '</div>' +
          '<div class="queue-meta">Ações</div>' +
          '<div class="queue-actions">' +
          item.actions
            .map(function (action) {
              return (
                '<button ' +
                'data-queue-action="1" ' +
                'class="' +
                escapeHtml(action.className || '') +
                '" ' +
                'type="button" ' +
                'onclick="' +
                escapeAttribute(action.handler) +
                "('" +
                escapeAttribute(item.id) +
                "')\">" +
                escapeHtml(action.label) +
                '</button>'
              );
            })
            .join('') +
          '</div>'
        );
      }

      function buildWorkQueueItems(data) {
        const generalItems = (data.geral || []).map(function (item) {
          var audit = buildAuditMetaLine_(item);
          var titulo = geralQueueTitleFromItem_(item);
          var urg = geralQueueUrgenciaFromItem_(item);
          var titleLine = titulo;
          var descLine =
            'Autor: ' +
            (item.Autor || '-') +
            ' · Urgência: ' +
            urg +
            ' · Descrição: ' +
            (item.Descricao || '-');
          return {
            id: item.ID,
            type: 'geral',
            originLabel: 'Solicitações',
            statusLabel: 'Pendente',
            statusKey: 'pendente',
            title: titleLine,
            description: descLine,
            person: item.Autor || '-',
            forecast: '',
            price: '',
            isOverdue: false,
            extraMeta: audit,
            syncState: item.__syncState || '',
            syncError: item.__syncError || '',
            timeLabel: formatDateTime(item.Timestamp),
            timeSort: parseDateTime_(item.Timestamp),
            actions:
              item.__syncState === 'syncing'
                ? []
                : [
                    {
                      label: 'Marcar como resolvido',
                      handler: 'markResolved',
                      className: '',
                    },
                  ],
          };
        });

        const medicationItems = (data.medicamentos || []).map(function (item) {
          const status = normalizeMedicationStatus_(item);
          const whatsappAvailable = canShowWhatsAppButton(item);
          const whatsappSent = normalizeWhatsappStatus_(item.Status_Aviso_WhatsApp) === 'tentativa registrada';

          const actions = [];
          if (!item.Comprado && item.__syncState !== 'syncing') {
            actions.push({
              label: 'Marcar como comprado',
              handler: 'markPurchased',
              className: 'secondary',
            });
          }

          if (whatsappAvailable && item.__syncState !== 'syncing') {
            actions.push({
              label: whatsappSent ? 'Reabrir WhatsApp' : 'Avisar no WhatsApp',
              handler: 'notifyClientWhatsApp',
              className: 'whatsapp',
            });
          }

          if (!item.Entregue && item.__syncState !== 'syncing') {
            actions.push({
              label: 'Marcar como entregue',
              handler: 'markDelivered',
              className: '',
            });
          }

          var auditMed = buildAuditMetaLine_(item);

          return {
            id: item.ID,
            type: 'medicamento',
            originLabel: 'Medicamentos',
            statusLabel: status.label,
            statusKey: status.key,
            title: item.Medicamento || 'Medicamento sem nome',
            description: 'Tipo: ' + (item.Tipo || '-') + ' | Pré-pago: ' + (item.Pre_Pago ? 'Sim' : 'Não'),
            person: item.Cliente ? item.Cliente + ' / ' + (item.Atendente || '-') : item.Atendente || '-',
            forecast: item.Previsao_Entrega ? formatDate(item.Previsao_Entrega) : '',
            price: medicationTipoFromRecord_(item) === 'falta' ? '' : formatCurrencyBr_(item.Preco_Venda),
            isOverdue: isOverdue(item),
            extraMeta:
              (auditMed ? auditMed + ' | ' : '') +
              'Aviso WhatsApp: ' +
              (item.Status_Aviso_WhatsApp || 'Não registrado') +
              (item.Telefone ? ' | Telefone: ' + item.Telefone : ''),
            syncState: item.__syncState || '',
            syncError: item.__syncError || '',
            timeLabel: formatDateTime(item.Timestamp),
            timeSort: parseDateTime_(item.Timestamp),
            whatsappNotSent: whatsappAvailable && !whatsappSent,
            actions: actions,
          };
        });

        return generalItems.concat(medicationItems).sort(function (a, b) {
          if (a.isOverdue !== b.isOverdue) {
            return a.isOverdue ? -1 : 1;
          }

          const timeA = Number(a.timeSort || 0);
          const timeB = Number(b.timeSort || 0);
          return timeB - timeA;
        });
      }

      function filterQueueItems_(items) {
        switch (activeQueueFilter) {
          case 'pendentes':
            return items.filter(function (item) {
              return item.statusKey === 'pendente';
            });
          case 'comprados':
            return items.filter(function (item) {
              return item.statusKey === 'comprado';
            });
          case 'entregues':
            return items.filter(function (item) {
              return item.statusKey === 'entregue';
            });
          case 'resolvidos_parcialmente':
            return items.filter(function (item) {
              return item.statusKey === 'resolvido_parcialmente';
            });
          case 'comprados_sem_aviso':
            return items.filter(function (item) {
              return item.type === 'medicamento' && item.statusKey === 'comprado' && item.whatsappNotSent;
            });
          case 'vencidos_hoje':
            return items.filter(function (item) {
              return item.type === 'medicamento' && item.isOverdue;
            });
          case 'resolvidos':
            return items;
          case 'todos':
          default:
            return items;
        }
      }

      function setQueueFilter(filterKey) {
        if (QUEUE_FILTERS.indexOf(filterKey) === -1) {
          return;
        }

        if (filterKey === 'resolvidos') {
          activeQueueFilter = filterKey;
          document.querySelectorAll('#queue-filters .filter-button').forEach(function (button) {
            button.classList.toggle('active', button.dataset.filter === filterKey);
          });
          queueSubtitle.textContent = 'Carregando histórico...';
          loadHistoricoIfNeeded_(function () {
            renderQueue();
            renderSummary();
          });
          return;
        }

        activeQueueFilter = filterKey;
        document.querySelectorAll('#queue-filters .filter-button').forEach(function (button) {
          button.classList.toggle('active', button.dataset.filter === filterKey);
        });
        renderQueue();
      }

      function humanizeQueueFilter_(filterKey) {
        const mapping = {
          todos: 'Todos',
          pendentes: 'Pendentes',
          comprados: 'Comprados',
          entregues: 'Entregues',
          resolvidos: 'Histórico / Resolvidos',
          resolvidos_parcialmente: 'Resolvidos parcialmente',
          comprados_sem_aviso: 'Comprados sem aviso',
          vencidos_hoje: 'Vencidos/Hoje',
        };
        return mapping[filterKey] || 'Todos';
      }

      function normalizeMedicationStatus_(item) {
        const statusText = String(item.Status || '')
          .trim()
          .toLowerCase();
        if (item.Entregue || statusText === 'entregue') {
          return { key: 'entregue', label: 'Entregue' };
        }
        if (statusText === 'resolvido parcialmente') {
          return { key: 'resolvido_parcialmente', label: 'Resolvido parcialmente' };
        }
        if (item.Comprado || statusText === 'comprado') {
          return { key: 'comprado', label: 'Comprado' };
        }
        return { key: 'pendente', label: 'Pendente' };
      }

      function normalizeWhatsappStatus_(value) {
        return String(value || '')
          .trim()
          .toLowerCase();
      }

      function checklistDraftKey_(id) {
        return String(id == null ? '' : id).trim();
      }

      function flushActiveObservationDraftToStore_() {
        var ae = document.activeElement;
        if (!ae || !ae.getAttribute) {
          return;
        }
        if (ae.getAttribute('data-check-obs-input') !== '1') {
          return;
        }
        var cid = ae.getAttribute('data-check-item-id');
        if (!cid) {
          return;
        }
        checklistObservationDrafts[checklistDraftKey_(cid)] = ae.value;
      }

      function syncObservationDraftFromEventTarget_(target) {
        if (!target || !target.getAttribute) {
          return;
        }
        if (target.getAttribute('data-check-obs-input') !== '1') {
          return;
        }
        var cid = target.getAttribute('data-check-item-id');
        if (!cid) {
          return;
        }
        checklistObservationDrafts[checklistDraftKey_(cid)] = target.value;
      }

      function ensureChecklistObservationDelegation_() {
        if (!checklistCategories || checklistCategories.dataset.handoverObsDeleg === '1') {
          return;
        }
        checklistCategories.dataset.handoverObsDeleg = '1';
        checklistCategories.addEventListener(
          'input',
          function (ev) {
            syncObservationDraftFromEventTarget_(ev.target);
          },
          false
        );
        checklistCategories.addEventListener(
          'change',
          function (ev) {
            syncObservationDraftFromEventTarget_(ev.target);
          },
          false
        );
        checklistCategories.addEventListener(
          'compositionend',
          function (ev) {
            syncObservationDraftFromEventTarget_(ev.target);
          },
          false
        );
        checklistCategories.addEventListener(
          'blur',
          function (ev) {
            syncObservationDraftFromEventTarget_(ev.target);
          },
          true
        );
      }

      function renderChecklistSummaryBarAndHints_() {
        const checklist = dashboardData.checklistTurno;
        const items = checklist.items || [];
        const summary = checklist.summary || buildChecklistSummary_(items);
        const hasLateAlert = checklist.isAfterDeadline && summary.itensPendentes > 0;

        checklistSummary.innerHTML = [
          '<span class="checklist-chip">Turno: ' + escapeHtml(checklist.turno || 'Manhã') + '</span>',
          '<span class="checklist-chip">Data: ' + escapeHtml(checklist.data || '-') + '</span>',
          '<span class="checklist-chip">Itens: ' + escapeHtml(summary.totalItens) + '</span>',
          '<span class="checklist-chip">Feitos: ' + escapeHtml(summary.itensFeitos) + '</span>',
          '<span class="checklist-chip">Pendentes: ' + escapeHtml(summary.itensPendentes) + '</span>',
          '<span class="checklist-chip">Concluído: ' + escapeHtml(summary.percentualConcluido) + '%</span>',
          hasLateAlert
            ? '<span class="checklist-chip alert">Pendências após 07:30</span>'
            : '',
        ].join('');

        if (items.length > 0) {
          checklistHint.textContent = 'Checklist de hoje já gerado.';
          checklistGenerateBtn.textContent = 'Atualizar visualização';
        } else {
          checklistHint.textContent = 'Checklist ainda não gerado.';
          checklistGenerateBtn.textContent = 'Gerar checklist de hoje';
        }

        checklistContent.classList.toggle('hidden', !isChecklistExpanded);
        checklistToggleBtn.textContent = isChecklistExpanded ? 'Fechar checklist' : 'Abrir checklist';
      }

      function renderChecklistSection() {
        captureObservationDraftsFromDom_();
        renderChecklistSummaryBarAndHints_();

        const checklist = dashboardData.checklistTurno;
        const items = checklist.items || [];

        if (!isChecklistExpanded) {
          checklistCategories.innerHTML = '';
          return;
        }

        if (items.length === 0) {
          checklistCategories.innerHTML =
            '<div class="empty-box">Sem itens para o turno. Clique em "Gerar checklist de hoje".</div>';
          return;
        }

        const grouped = groupChecklistByCategory_(items);
        checklistCategories.innerHTML = Object.keys(grouped)
          .map(function (category) {
            const categoryKey = encodeURIComponent(category);
            const categoryItems = grouped[category];
            const summaryByCategory = buildChecklistSummary_(categoryItems);
            const isOpen = openChecklistCategories.has(category);
            const visibleItems = filterChecklistItemsForView_(categoryItems);
            const itemsHtml = isOpen
              ? visibleItems.length > 0
                ? visibleItems
                    .map(function (item) {
                      return buildChecklistItemHtml_(item, checklist.isAfterDeadline);
                    })
                    .join('')
                : '<div class="empty-box">Nenhum item neste filtro nesta categoria.</div>'
              : '';

            return (
              '<section class="checklist-category">' +
              '<button type="button" class="checklist-category-head" onclick="toggleChecklistCategory(\'' +
              escapeAttribute(categoryKey) +
              "')\">" +
              '<span>' +
              escapeHtml(category) +
              '</span>' +
              '<span class="checklist-category-meta">' +
              escapeHtml(summaryByCategory.itensFeitos) +
              '/' +
              escapeHtml(summaryByCategory.totalItens) +
              ' feitos • ' +
              escapeHtml(summaryByCategory.itensPendentes) +
              ' pend. • ' +
              escapeHtml(summaryByCategory.itensNaoAplicaveis) +
              ' N/A</span>' +
              '</button>' +
              (isOpen ? '<div class="checklist-items">' + itemsHtml + '</div>' : '') +
              '</section>'
            );
          })
          .join('');
        ensureChecklistObservationDelegation_();
      }

      function captureObservationDraftsFromDom_() {
        flushActiveObservationDraftToStore_();
        if (!checklistCategories) {
          return;
        }
        checklistCategories.querySelectorAll('[data-check-obs-input]').forEach(function (el) {
          var id = el.getAttribute('data-check-item-id');
          if (id) {
            checklistObservationDrafts[checklistDraftKey_(id)] = el.value;
          }
        });
      }

      function getObservationValueForItem_(item) {
        if (!item || !item.ID) {
          return '';
        }
        var key = checklistDraftKey_(item.ID);
        if (Object.prototype.hasOwnProperty.call(checklistObservationDrafts, key)) {
          return checklistObservationDrafts[key];
        }
        return item.Observacao || '';
      }

      function findChecklistItemModel_(itemId) {
        var key = checklistDraftKey_(itemId);
        var items = dashboardData.checklistTurno.items || [];
        for (var i = 0; i < items.length; i++) {
          if (checklistDraftKey_(items[i].ID) === key) {
            return items[i];
          }
        }
        return null;
      }

      function refreshChecklistCategoryHeadMeta_() {
        if (!checklistCategories) {
          return;
        }
        var checklist = dashboardData.checklistTurno;
        var items = checklist.items || [];
        var grouped = groupChecklistByCategory_(items);
        checklistCategories.querySelectorAll('.checklist-category').forEach(function (sec) {
          var headBtn = sec.querySelector('.checklist-category-head');
          if (!headBtn) {
            return;
          }
          var spans = headBtn.querySelectorAll('span');
          if (spans.length < 2) {
            return;
          }
          var catName = spans[0].textContent || '';
          var meta = spans[1];
          var bucket = grouped[catName];
          if (!bucket) {
            return;
          }
          var summaryByCategory = buildChecklistSummary_(bucket);
          meta.textContent =
            summaryByCategory.itensFeitos +
            '/' +
            summaryByCategory.totalItens +
            ' feitos • ' +
            summaryByCategory.itensPendentes +
            ' pend. • ' +
            summaryByCategory.itensNaoAplicaveis +
            ' N/A';
        });
      }

      function patchChecklistItemArticle_(itemId) {
        if (!checklistCategories || !isChecklistExpanded) {
          return false;
        }
        var item = findChecklistItemModel_(itemId);
        if (!item) {
          return false;
        }
        var sid = checklistDraftKey_(itemId).replace(/\\/g, '\\\\').replace(/"/g, '\\"');
        var host = checklistCategories.querySelector('[data-check-item-id="' + sid + '"]');
        if (!host) {
          return false;
        }
        var visible = filterChecklistItemsForView_([item]).length > 0;
        if (!visible) {
          var parentItems = host.closest('.checklist-items');
          host.remove();
          if (parentItems && !parentItems.querySelector('[data-check-item-id]')) {
            parentItems.innerHTML =
              '<div class="empty-box">Nenhum item neste filtro nesta categoria.</div>';
          }
          renderChecklistSummaryBarAndHints_();
          refreshChecklistCategoryHeadMeta_();
          return true;
        }

        var html = buildChecklistItemHtml_(item, dashboardData.checklistTurno.isAfterDeadline);
        var tpl = document.createElement('template');
        tpl.innerHTML = html.trim();
        var fresh = tpl.content.firstElementChild;
        if (!fresh) {
          return false;
        }
        host.replaceWith(fresh);
        renderChecklistSummaryBarAndHints_();
        refreshChecklistCategoryHeadMeta_();
        return true;
      }

      function groupChecklistByCategory_(items) {
        return items.reduce(function (groups, item) {
          const category = item.Categoria || 'Sem categoria';
          if (!groups[category]) {
            groups[category] = [];
          }
          groups[category].push(item);
          return groups;
        }, {});
      }

      function mapUiChecklistStatusToServer_(label) {
        if (label === 'Feito') {
          return 'Feito';
        }
        if (label === 'Não aplicável') {
          return 'Não aplicável';
        }
        return 'Pendente';
      }

      function formatNowLocalIso_() {
        var d = new Date();
        function pad(n) {
          return String(n).padStart(2, '0');
        }
        return (
          d.getFullYear() +
          '-' +
          pad(d.getMonth() + 1) +
          '-' +
          pad(d.getDate()) +
          'T' +
          pad(d.getHours()) +
          ':' +
          pad(d.getMinutes()) +
          ':' +
          pad(d.getSeconds())
        );
      }

      function optimisticChecklistPatch_(id, uiStatusLabel) {
        var items = dashboardData.checklistTurno.items || [];
        var idx = items.findIndex(function (i) {
          return checklistDraftKey_(i.ID) === checklistDraftKey_(id);
        });
        if (idx < 0) {
          return;
        }
        var serverStatus = mapUiChecklistStatusToServer_(uiStatusLabel);
        var item = items[idx];
        var op = getOperadorAtual_();
        item.Status = serverStatus;
        if (serverStatus === 'Pendente') {
          item.Data_Hora_Check = '';
          item.Responsavel = '';
        } else {
          item.Responsavel = op;
          item.Data_Hora_Check = formatNowLocalIso_();
        }
        dashboardData.checklistTurno.summary = buildChecklistSummary_(items);
      }

      function resyncChecklistFromServer_() {
        var started = Date.now();
        try {
          getScriptRunner_()
            .withSuccessHandler(function (response) {
              dashboardData.checklistTurno = normalizeChecklistData_(response.checklistTurno);
              perfLog_('generateTodayMorningChecklist', started);
              renderChecklistSection();
              renderSummary();
            })
            .withFailureHandler(function (error) {
              setStatus(checklistStatus, getErrorMessage(error), true);
            })
            .generateTodayMorningChecklist();
        } catch (error) {
          setStatus(checklistStatus, error.message, true);
        }
      }

      function buildChecklistItemHtml_(item, isAfterDeadline) {
        const status = formatChecklistStatus_(item.Status);
        const statusClass = statusToClass_(status);
        const isLate = isAfterDeadline && status === 'Pendente';
        const isSaving =
          checklistDraftKey_(checklistPendingItemId) === checklistDraftKey_(item.ID);
        const itemClass = 'check-item' + (isLate ? ' late' : '') + (isSaving ? ' syncing' : '');
        const observationInputId = buildChecklistObservationInputId_(item.ID);
        const showObservation = openChecklistObservations.has(checklistDraftKey_(item.ID));
        var obsDraftVal = getObservationValueForItem_(item);
        const hasObservation = Boolean((obsDraftVal || '').trim());
        const checkInfo = item.Data_Hora_Check
          ? 'Última marcação: ' + formatDateTime(item.Data_Hora_Check)
          : 'Sem marcação';
        const respLine = item.Responsavel ? 'Responsável: ' + item.Responsavel : '';

        return (
          '<article class="' +
          itemClass +
          '" data-check-item-id="' +
          escapeAttribute(item.ID) +
          '">' +
          '<div class="check-item-title">' +
          escapeHtml(item.Item) +
          ' <span class="badge ' +
          statusClass +
          '">' +
          escapeHtml(status) +
          '</span>' +
          '</div>' +
          '<div class="check-item-desc">' +
          escapeHtml(item.Descricao || '') +
          '</div>' +
          '<div class="check-item-meta">' +
          escapeHtml([checkInfo, respLine].filter(Boolean).join(' · ')) +
          '</div>' +
          '<div class="check-actions">' +
          buildChecklistActionButton_(item.ID, 'Feito', status === 'Feito', '', status) +
          buildChecklistActionButton_(item.ID, 'Não aplicável', status === 'Não aplicável', 'secondary', status) +
          buildChecklistActionButton_(item.ID, 'Pendente', status === 'Pendente', 'light', status) +
          '</div>' +
          '<div class="obs-bar">' +
          '<button type="button" class="light" onclick="toggleChecklistObservation(\'' +
          escapeAttribute(item.ID) +
          '\')">' +
          (showObservation ? 'Fechar observação' : 'Observação') +
          '</button>' +
          (hasObservation ? '<span class="obs-flag">com observação</span>' : '<span></span>') +
          '</div>' +
          (showObservation
            ? '<div class="obs-panel">' +
              '<input id="' +
              escapeAttribute(observationInputId) +
              '" type="text" data-check-obs-input="1" data-check-item-id="' +
              escapeAttribute(item.ID) +
              '" value="' +
              escapeAttribute(obsDraftVal) +
              '" placeholder="Observação do item">' +
              '<button type="button" class="light" onclick="saveChecklistObservation(\'' +
              escapeAttribute(item.ID) +
              '\', \'' +
              escapeAttribute(observationInputId) +
              '\')">Salvar</button>' +
              '</div>'
            : '') +
          '</article>'
        );
      }

      function buildChecklistActionButton_(itemId, statusLabel, isActive, className, statusNow) {
        var correction =
          (statusNow === 'Feito' || statusNow === 'Não aplicável') && !isActive ? ' correction' : '';
        var statusClass = (className ? ' ' + className : '') + correction;
        var activeClass = isActive ? ' active' : '';
        var label = statusLabel;
        if (statusLabel === 'Feito' && isActive) {
          label = 'Feito ✓';
        }
        if (statusLabel === 'Não aplicável' && isActive) {
          label = 'N/A ✓';
        }
        var shortLabel = statusLabel === 'Não aplicável' && !isActive ? 'N/A' : label;
        var savingAttr =
          checklistDraftKey_(checklistPendingItemId) === checklistDraftKey_(itemId) ? ' disabled' : '';
        return (
          '<button ' +
          'type="button" ' +
          'class="' +
          statusClass.trim() +
          activeClass +
          '" ' +
          'data-check-action="1" ' +
          savingAttr +
          ' onclick="updateChecklistStatus(\'' +
          escapeAttribute(itemId) +
          "', '" +
          escapeAttribute(statusLabel) +
          "')\">" +
          escapeHtml(shortLabel) +
          '</button>'
        );
      }

      function toggleChecklistPanel() {
        isChecklistExpanded = !isChecklistExpanded;
        renderChecklistSection();
      }

      function toggleChecklistCategory(encodedCategory) {
        const category = decodeURIComponent(encodedCategory);
        if (openChecklistCategories.has(category)) {
          openChecklistCategories.delete(category);
        } else {
          openChecklistCategories.add(category);
        }
        renderChecklistSection();
      }

      function toggleChecklistObservation(itemId) {
        var key = checklistDraftKey_(itemId);
        if (openChecklistObservations.has(key)) {
          openChecklistObservations.delete(key);
        } else {
          openChecklistObservations.add(key);
        }
        renderChecklistSection();
      }

      function updateChecklistStatus(id, status) {
        var operador = ensureOperadorForCriticalAction_();
        if (!operador) {
          showToast_('Informe o operador atual antes de alterar o checklist.', true);
          return;
        }

        checklistPendingItemId = id;
        optimisticChecklistPatch_(id, status);
        if (!patchChecklistItemArticle_(id)) {
          renderChecklistSection();
        }

        var started = Date.now();
        clearStatus(checklistStatus);

        try {
          getScriptRunner_()
            .withSuccessHandler(function (response) {
              checklistPendingItemId = null;
              applyChecklistPatch_(response);
              perfLog_('updateChecklistItemStatus', started);
              if (!patchChecklistItemArticle_(id)) {
                renderChecklistSection();
              }
              renderSummary();
              showToast_('Checklist atualizado');
            })
            .withFailureHandler(function (error) {
              checklistPendingItemId = null;
              perfLog_('updateChecklistItemStatus_fail', started);
              resyncChecklistFromServer_();
              showToast_(getErrorMessage(error), true);
              setStatus(checklistStatus, getErrorMessage(error), true);
            })
            .updateChecklistItemStatus(id, status, operador);
        } catch (error) {
          checklistPendingItemId = null;
          resyncChecklistFromServer_();
          setStatus(checklistStatus, error.message, true);
          showToast_(error.message, true);
        }
      }

      function saveChecklistObservation(id, inputId) {
        const input = document.getElementById(inputId);
        const observacao = input ? input.value : '';
        checklistObservationDrafts[checklistDraftKey_(id)] = observacao;
        var operador = ensureOperadorForCriticalAction_();
        if (!operador) {
          showToast_('Informe o operador atual antes de salvar observação.', true);
          return;
        }

        checklistPendingItemId = id;
        if (!patchChecklistItemArticle_(id)) {
          renderChecklistSection();
        }
        setStatus(checklistStatus, 'Salvando observação...');

        var started = Date.now();
        try {
          getScriptRunner_()
            .withSuccessHandler(function (response) {
              checklistPendingItemId = null;
              applyChecklistPatch_(response);
              perfLog_('updateChecklistItemObservation', started);
              delete checklistObservationDrafts[checklistDraftKey_(id)];
              if (!patchChecklistItemArticle_(id)) {
                renderChecklistSection();
              }
              renderSummary();
              setStatus(checklistStatus, 'Observação salva.');
              showToast_('Observação salva');
            })
            .withFailureHandler(function (error) {
              checklistPendingItemId = null;
              perfLog_('updateChecklistItemObservation_fail', started);
              resyncChecklistFromServer_();
              setStatus(checklistStatus, getErrorMessage(error), true);
              showToast_(getErrorMessage(error), true);
            })
            .updateChecklistItemObservation(id, observacao, operador);
        } catch (error) {
          checklistPendingItemId = null;
          resyncChecklistFromServer_();
          setStatus(checklistStatus, error.message, true);
          showToast_(error.message, true);
        }
      }

      function refreshChecklistToday() {
        setStatus(checklistStatus, 'Atualizando checklist...');
        setChecklistButtonsDisabled(true);

        var started = Date.now();
        try {
          getScriptRunner_()
            .withSuccessHandler(function (response) {
              dashboardData.checklistTurno = normalizeChecklistData_(response.checklistTurno);
              perfLog_('generateTodayMorningChecklist', started);
              renderAll();
              setStatus(checklistStatus, 'Checklist atualizado.');
              setChecklistButtonsDisabled(false);
              showToast_('Checklist atualizado');
            })
            .withFailureHandler(function (error) {
              setStatus(checklistStatus, getErrorMessage(error), true);
              setChecklistButtonsDisabled(false);
              showToast_(getErrorMessage(error), true);
            })
            .generateTodayMorningChecklist();
        } catch (error) {
          setStatus(checklistStatus, error.message, true);
          setChecklistButtonsDisabled(false);
          showToast_(error.message, true);
        }
      }

      function formatChecklistStatus_(status) {
        const normalized = String(status || '')
          .trim()
          .toLowerCase();
        if (normalized === 'feito') {
          return 'Feito';
        }
        if (normalized === 'não aplicável' || normalized === 'nao aplicavel' || normalized === 'n/a') {
          return 'Não aplicável';
        }
        return 'Pendente';
      }

      function statusToClass_(status) {
        if (status === 'Feito') {
          return 'status-feito';
        }
        if (status === 'Não aplicável') {
          return 'status-na';
        }
        if (status === 'Entregue') {
          return 'status-entregue';
        }
        if (status === 'Comprado') {
          return 'status-comprado';
        }
        return 'status-pendente';
      }

      function buildChecklistObservationInputId_(id) {
        return 'check-obs-' + String(id || '').replace(/[^a-zA-Z0-9_-]/g, '_');
      }

      function buildChecklistSummary_(items) {
        const totalItens = items.length;
        const itensFeitos = items.filter(function (item) {
          return formatChecklistStatus_(item.Status) === 'Feito';
        }).length;
        const itensNaoAplicaveis = items.filter(function (item) {
          return formatChecklistStatus_(item.Status) === 'Não aplicável';
        }).length;
        const itensPendentes = items.filter(function (item) {
          return formatChecklistStatus_(item.Status) === 'Pendente';
        }).length;
        const percentualConcluido =
          totalItens > 0 ? Math.round(((itensFeitos + itensNaoAplicaveis) / totalItens) * 100) : 0;

        return {
          totalItens: totalItens,
          itensFeitos: itensFeitos,
          itensNaoAplicaveis: itensNaoAplicaveis,
          itensPendentes: itensPendentes,
          percentualConcluido: percentualConcluido,
        };
      }

      function syncAutorFieldFromOperador_() {
        var autorEl = document.getElementById('autor');
        if (autorEl) {
          autorEl.value = getOperadorAtual_();
        }
      }

      function closeFormModal_() {
        if (!formModalOverlay) {
          return;
        }
        formModalOverlay.classList.add('hidden');
        formModalOverlay.setAttribute('aria-hidden', 'true');
        document.body.style.overflow = '';
        if (toggleFormBtn) {
          toggleFormBtn.textContent = 'Novo registro';
        }
        requestForm.reset();
        updateVisibleFields();
        updateMedicinePriceVisibility_();
        clearStatus(formStatus);
      }

      function openFormModal_() {
        if (!formModalOverlay) {
          return;
        }
        requestForm.reset();
        updateVisibleFields();
        updateMedicinePriceVisibility_();
        syncAutorFieldFromOperador_();
        clearStatus(formStatus);
        formModalOverlay.classList.remove('hidden');
        formModalOverlay.setAttribute('aria-hidden', 'false');
        document.body.style.overflow = 'hidden';
        if (toggleFormBtn) {
          toggleFormBtn.textContent = 'Fechar novo registro';
        }
        window.setTimeout(function () {
          if (categorySelect.value === 'Medicamentos') {
            var med = document.getElementById('medicamento');
            if (med) {
              med.focus();
            }
          } else {
            var tg = document.getElementById('tituloGeral');
            if (tg) {
              tg.focus();
            }
          }
        }, 0);
      }

      function setPrevisaoOffsetDays(days) {
        var el = document.getElementById('previsaoEntrega');
        if (!el) {
          return;
        }
        var d = new Date();
        d.setDate(d.getDate() + Number(days));
        var y = d.getFullYear();
        var m = String(d.getMonth() + 1).padStart(2, '0');
        var day = String(d.getDate()).padStart(2, '0');
        el.value = y + '-' + m + '-' + day;
      }

      function updateVisibleFields() {
        const isMedication = categorySelect.value === 'Medicamentos';
        generalFields.classList.toggle('hidden', isMedication);
        medicineFields.classList.toggle('hidden', !isMedication);
        clearStatus(formStatus);
        updateMedicinePriceVisibility_();
      }

      function toggleFormPanel() {
        if (!formModalOverlay) {
          return;
        }
        if (formModalOverlay.classList.contains('hidden')) {
          openFormModal_();
        } else {
          closeFormModal_();
        }
      }

      function removeOptimisticPlaceholder_(optimisticId, tab) {
        if (tab === 'Geral') {
          dashboardData.geral = (dashboardData.geral || []).filter(function (g) {
            return g.ID !== optimisticId;
          });
        } else {
          dashboardData.medicamentos = (dashboardData.medicamentos || []).filter(function (m) {
            return m.ID !== optimisticId;
          });
        }
      }

      function handleSubmit(event) {
        event.preventDefault();
        clearStatus(formStatus);

        var operador = ensureOperadorForCriticalAction_();
        if (!operador) {
          setStatus(formStatus, 'Informe o operador atual no topo antes de salvar.', true);
          return;
        }
        syncAutorFieldFromOperador_();

        const tab = categorySelect.value;
        const payload = tab === 'Geral' ? getGeneralPayload() : getMedicinePayload();
        var isFalta = false;

        if (tab === 'Medicamentos') {
          isFalta = String(payload.tipo || '').toLowerCase() === 'falta';
          if (!isFalta) {
